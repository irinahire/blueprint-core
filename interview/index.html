<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Entrevista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --fucsia: #bc8abf; 
            --gris-claro: #e0e0e0;
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); 
            --btn-gradient: linear-gradient(to right, #96e8da 0%, #bc8abf 100%);
            --bg-dark: #05070a; 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1050px; height: 92vh; display: flex; align-items: center; justify-content: center; }
        .app-shell { width: 100%; height: 100%; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { height: 80px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; color: white; font-weight: 900; font-family: 'Montserrat', sans-serif; flex-shrink: 0; }
        
        .content-area { flex: 1; display: flex; overflow: hidden; }
        .interview-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px; text-align: center; }
        
        .btn-call { background: var(--btn-gradient); color: white; border: none; padding: 20px 50px; border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 20px; text-transform: uppercase; margin-top: 30px; box-shadow: 0 10px 20px rgba(188, 138, 191, 0.3); }
        
        .sidebar { width: 300px; position: relative; flex-shrink: 0; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 10%); }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-shell">
        <div class="header">
            <div>BLUE LAB</div>
            <div>Irina Hire Selection</div>
        </div>
        
        <div class="content-area">
            <div class="interview-container">
                <h1 style="color:var(--fucsia); font-size: 48px;">Hola, <span id="user-name">Walter</span></h1>
                <p style="font-size: 20px; color: #555; max-width: 600px;">
                    Irina ha analizado tu trayectoria y está lista para conversar sobre tu experiencia en el sector.
                </p>
                <button class="btn-call" onclick="iniciarLlamada()">Iniciar Protocolo</button>
                <p style="font-size: 12px; color: #999; margin-top: 20px;">Se establecerá una conexión cifrada de voz con la IA.</p>
            </div>
            
            <div class="sidebar"><img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg"></div>
        </div>
    </div>
</div>

<script>
    function iniciarLlamada() {
        alert("Iniciando sesión de voz con Irina...");
        // Aquí conectaremos mañana con el motor de voz
    }
</script>
</body>
</html>
