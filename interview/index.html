<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Entrevista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%);
            --fucsia-solid: #bc8abf;
            --bg-dark: #05070a;
        }

        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }

        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; height: 85vh; display: flex; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }

        /* VINCHA EXTRAÍDA */
        .top-vincha {
            width: 100%; height: 90px;
            background: var(--irina-gradient);
            display: flex; align-items: center; 
            justify-content: space-between;
            padding: 0 45px; box-sizing: border-box;
            z-index: 20;
        }

        .brand-left { display: flex; flex-direction: column; color: white; font-family: 'Montserrat', sans-serif; }
        .blue-lab-text { font-weight: 900; font-size: 26px; }
        .blueprint-subtext { font-weight: 700; font-size: 11px; text-transform: uppercase; }

        .vincha-title {
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; text-transform: uppercase;
            background: white; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-image: var(--irina-gradient);
            filter: drop-shadow(2px 0 0 white) drop-shadow(-2px 0 0 white) drop-shadow(0 2px 0 white) drop-shadow(0 -2px 0 white);
        }

        .main-body { flex: 1; display: flex; padding: 40px; align-items: center; justify-content: center; text-align: center; }
        .btn-call { background: var(--fucsia-solid); color: white; border: none; padding: 20px 40px; border-radius: 14px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 18px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="outer-frame">
        <div class="app-container">
            <div class="top-vincha">
                <div class="brand-left">
                    <span class="blue-lab-text">BLUE LAB</span>
                    <span class="blueprint-subtext">Blueprint Integrations Lab</span>
                </div>
                <div class="vincha-title">Irina Hire Selection</div>
            </div>

            <div class="main-body">
                <div>
                    <h1 style="color: var(--fucsia-solid);">Listo para tu entrevista</h1>
                    <p>Hola Walter, el análisis de tu perfil está completo.</p>
                    <button class="btn-call" onclick="alert('Iniciando llamada...')">Iniciar llamada con Irina</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
