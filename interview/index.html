<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Entrevista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"></script>
    <style>
        :root {
            --fucsia: #bc8abf;
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%);
            --btn-gradient: linear-gradient(to right, #96e8da 0%, #bc8abf 100%);
            --bg-dark: #05070a;
        }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; }
        .card { background: white; width: 100%; border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; }
        
        .header { height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; flex-shrink: 0; }
        .brand-left { display: flex; flex-direction: column; color: white; font-family: 'Montserrat', sans-serif; }
        .blue-lab-text { font-weight: 900; font-size: 26px; }
        .blueprint-subtext { font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; text-transform: uppercase; background: white; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: var(--irina-gradient); filter: drop-shadow(2px 0 0 white) drop-shadow(-2px 0 0 white) drop-shadow(0 2px 0 white) drop-shadow(0 -2px 0 white); }

        .content { display: flex; min-height: 500px; }
        .left-col { padding: 40px 60px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .right-col { width: 400px; }
        .right-col img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }

        h2 { font-size: 18px; margin-top: 0; }
        ul { padding-left: 20px; }
        li { margin-bottom: 12px; font-size: 14px; line-height: 1.4; }
        
        .btn-wrapper { position: relative; padding: 3px; border-radius: 8px; overflow: hidden; cursor: pointer; width: fit-content; margin-top: 30px; }
        /* Efecto de borde en hover */
        .btn-wrapper:hover { border: 2px solid #bc8abf; padding: 1px; }
        
        .btn-pub { background: var(--btn-gradient); color: white; border: none; padding: 15px 35px; border-radius: 6px; font-weight: 800; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 14px; text-transform: uppercase; width: 100%; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="card">
        <div class="header">
            <div class="brand-left">
                <span class="blue-lab-text">BLUE LAB</span>
                <span class="blueprint-subtext">Blueprint Integrations Lab</span>
            </div>
            <div class="vincha-title">Irina Hire Selection</div>
        </div>
        
        <div class="content">
            <div class="left-col">
                <h2>PARA UNA ENTREVISTA DE CALIDAD:</h2>
                <ul>
                    <li>🎧 <b>Audio y Micrófono:</b> Use auriculares.</li>
                    <li>🤫 <b>Entorno:</b> Lugar silencioso y privado.</li>
                    <li>📶 <b>Conexión:</b> Asegure una conexión estable.</li>
                    <li>🆔 <b>Identidad:</b> Tenga su DNI a mano.</li>
                </ul>
                
                <div class="btn-wrapper" id="start-wrapper">
                    <button class="btn-pub" id="start-btn">ESTOY LISTO PARA LA ENTREVISTA</button>
                </div>
            </div>
            <div class="right-col">
                <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" alt="Irina">
            </div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('start-btn');
    const startWrapper = document.getElementById('start-wrapper');
    const FUNCTION_URL = "https://zuzvozgjsppkxvdlptmk.supabase.co/functions/v1/start-interview";

    // Extraer applicantId de la URL (ej: bluelab.online/interview?applicantId=123)
    const urlParams = new URLSearchParams(window.location.search);
    const applicantId = urlParams.get('applicantId');

    btn.addEventListener('click', async () => {
        if (!applicantId) {
            alert("Error: No se encontró un ID de postulante válido.");
            return;
        }

        btn.innerText = "Configurando entrevista...";
        btn.disabled = true;

        try {
            const response = await fetch(FUNCTION_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ applicantId: applicantId })
            });

            const config = await response.json();
            if (!response.ok) throw new Error(config.error || "Error al conectar");

            // Iniciar SDK de Vapi
            window.vapiSDK.run({
                apiKey: config.publicKey, 
                assistant: config.assistantId,
                assistantOverrides: config.assistantOverrides
            });

            // Ocultar botón y dejar que el SDK muestre el círculo verde
            startWrapper.classList.add('hidden');
        } catch (error) {
            console.error("Error:", error);
            btn.innerText = "Error - Reintentar";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
