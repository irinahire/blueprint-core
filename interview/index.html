<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Entrevista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"></script>
    <style>
        :root {
            --fucsia: #bc8abf;
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%);
            --btn-gradient: linear-gradient(135deg, #96e8da 0%, #bc8abf 100%);
            --bg-dark: #05070a;
        }
        /* Corregido: Fondo gris oscuro suave en lugar de negro total */
        body { margin: 0; background: #f4f7f6; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; position: relative; }
        .card { background: white; width: 100%; border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
        
        .header { height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; flex-shrink: 0; }
        .brand-left { display: flex; flex-direction: column; color: white; font-family: 'Montserrat', sans-serif; }
        .blue-lab-text { font-weight: 900; font-size: 26px; }
        .blueprint-subtext { font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; text-transform: uppercase; color: white; }

        .content { display: flex; min-height: 500px; position: relative; }
        
        #start-wrapper { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; text-align: center; }
        .btn-wrapper { padding: 2px; border-radius: 8px; border: 2px solid transparent; transition: border 0.3s ease; }
        .btn-pub { background: var(--btn-gradient); color: white; border: none; padding: 15px 30px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 14px; text-transform: uppercase; }
        
        .left-col { padding: 60px; flex: 1; }
        .right-col { width: 400px; }
        .right-col img { width: 100%; height: 100%; object-fit: cover; }

        /* Estilos del Botón Vapi - Corregidos para no afectar el resto */
        .vapi-btn {
            border-radius: 14px !important; 
            width: 280px !important; 
            height: 60px !important;
            background: var(--irina-gradient) !important;
            position: fixed !important;
            bottom: 30px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 999999 !important;
            padding: 3px !important;
            border: none !important;
        }
        .vapi-btn::after {
            content: attr(data-text);
            position: absolute;
            inset: 3px;
            background: #96e8da;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #05070a !important;
            font-weight: 800;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="card">
        <div class="header">
            <div class="brand-left">
                <span class="blue-lab-text">BLUE LAB</span>
                <span class="blueprint-subtext">Blueprint Integrations Lab</span>
            </div>
            <div class="vincha-title">Irina Hire Selection</div>
        </div>
        <div class="content">
            <div id="start-wrapper">
                <div class="btn-wrapper">
                    <button class="btn-pub" id="start-btn">ESTOY LISTO PARA LA ENTREVISTA</button>
                </div>
            </div>
            <div class="left-col">
                <h2>INSTRUCCIONES:</h2>
                <p>Asegúrese de estar en un lugar silencioso y con buena conexión.</p>
            </div>
            <div class="right-col">
                <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" alt="Irina">
            </div>
        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('start-btn');
    const FUNCTION_URL = "https://zuzvozgjsppkxvdlptmk.supabase.co/functions/v1/start-interview";
    const applicantId = new URLSearchParams(window.location.search).get('applicantId');

    btn.addEventListener('click', async () => {
        btn.innerText = "CONECTANDO...";
        btn.disabled = true;

        try {
            const response = await fetch(FUNCTION_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ applicantId })
            });

            const config = await response.json();
            const vapi = window.vapiSDK.run({
                apiKey: config.publicKey, 
                assistant: config.assistantId,
                assistantOverrides: config.assistantOverrides
            });

            const check = setInterval(() => {
                const b = document.querySelector('.vapi-btn');
                if (b) {
                    b.setAttribute('data-text', 'INICIAR ENTREVISTA');
                    document.getElementById('start-wrapper').style.display = 'none';
                    clearInterval(check);
                }
            }, 100);

            vapi.on('call-start', () => document.querySelector('.vapi-btn').setAttribute('data-text', 'FINALIZAR ENTREVISTA'));
            vapi.on('call-end', () => document.querySelector('.vapi-btn').setAttribute('data-text', 'INICIAR ENTREVISTA'));

        } catch (e) {
            console.error(e);
            btn.innerText = "ERROR - REINTENTAR";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
