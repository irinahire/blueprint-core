<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Entrevista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=stylesheet" rel="stylesheet">
    <style>
        :root {
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%);
            --fucsia-solid: #bc8abf;
            --bg-dark: #05070a;
            --text-dark: #111827;
            --text-gray: #4b5563;
        }

        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; height: 85vh; display: flex; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* VINCHA */
        .top-vincha { width: 100%; height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; box-sizing: border-box; }
        .brand-left { display: flex; flex-direction: column; color: white; font-family: 'Montserrat', sans-serif; }
        .blue-lab-text { font-weight: 900; font-size: 26px; }
        .blueprint-subtext { font-weight: 700; font-size: 11px; text-transform: uppercase; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; text-transform: uppercase; background: white; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-image: var(--irina-gradient); filter: drop-shadow(2px 0 0 white) drop-shadow(-2px 0 0 white) drop-shadow(0 2px 0 white) drop-shadow(0 -2px 0 white); }

        /* CUERPO */
        .main-body { flex: 1; display: flex; padding: 40px 80px; align-items: center; justify-content: space-between; overflow: hidden; }
        .info-side { flex: 1; padding-right: 40px; }
        
        .visual-side { width: 45%; height: 100%; display: flex; align-items: center; justify-content: flex-end; }
        .irina-bg { height: 90%; width: 100%; object-fit: cover; border-radius: 20px; }

        /* BOTÓN CON ANIMACIÓN LÁSER */
        .vapi-btn {
            border-radius: 14px; width: 300px; height: 60px;
            background: var(--irina-gradient);
            border: none; color: white; font-weight: 800; text-transform: uppercase;
            cursor: pointer; position: relative; overflow: hidden;
            margin-top: 30px;
        }
        .vapi-btn::before {
            content: ''; position: absolute; top: 50%; left: 50%; width: 200%; height: 400%;
            background: conic-gradient(transparent, transparent, transparent, white);
            transform: translate(-50%, -50%) rotate(0deg);
            animation: rotateLaser 3s linear infinite; display: none;
        }
        .vapi-btn:hover::before { display: block; }
        @keyframes rotateLaser { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .checklist { list-style: none; padding: 0; }
        .checklist li { margin-bottom: 15px; font-size: 14px; color: var(--text-gray); display: flex; align-items: center; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-container">
        <div class="top-vincha">
            <div class="brand-left">
                <span class="blue-lab-text">BLUE LAB</span>
                <span class="blueprint-subtext">Blueprint Integrations Lab</span>
            </div>
            <div class="vincha-title">Irina Hire Selection</div>
        </div>

        <div class="main-body">
            <div class="info-side">
                <h3 style="color:var(--text-dark);">PARA UNA ENTREVISTA DE CALIDAD:</h3>
                <ul class="checklist">
                    <li>🎧 <b>Audio:</b> Use auriculares.</li>
                    <li>🤫 <b>Entorno:</b> Privado y silencioso.</li>
                    <li>💡 <b>Ambiente:</b> Bien iluminado.</li>
                    <li>📶 <b>Conexión:</b> Internet estable.</li>
                    <li>🆔 <b>Identidad:</b> DNI a mano.</li>
                </ul>
                <button class="vapi-btn" onclick="alert('Iniciando...')">Iniciar entrevista con Irina</button>
            </div>
            <div class="visual-side">
                <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
            </div>
        </div>
    </div>
</div>

</body>
</html>
