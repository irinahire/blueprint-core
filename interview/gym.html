<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gimnasio de Habilidades - Irina Hire Selection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom left, #8EE4D5, #B588C0); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .main-container { background: #fff; width: 100%; max-width: 1200px; height: 85vh; display: flex; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .left-column { flex: 1; padding: 1.5rem 3rem 2rem 1.5rem; display: flex; flex-direction: column; overflow: hidden; }
        .header-container { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
        .logo { max-width: 140px; }
        
        /* Contenedor del Título del Gimnasio */
        .gym-header { margin-bottom: 2rem; }
        .gym-header h1 { color: #B588C0; font-size: 2rem; }
        .gym-header p { color: #555; margin-top: 5px; }

        .right-column { width: 30%; background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') 75% center/cover no-repeat; }
        .content-area { flex: 1; overflow-y: auto; padding-right: 15px; }
        
        .area-ejercicio { display: flex; flex-direction: column; gap: 20px; }
        button { padding: 1rem 2rem; background: #B588C0; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; width: fit-content; transition: opacity 0.3s; }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-column">
        <div class="header-container">
            <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" class="logo">
        </div>

        <div class="gym-header">
            <h1>Gimnasio de Habilidades</h1>
            <p>Bienvenido al espacio de entrenamiento. Aquí Irina evaluará tu ejecución técnica.</p>
        </div>

        <div id="gimnasio-content" class="content-area">
            <div class="area-ejercicio">
                <h3>Desafío Actual: Optimización de Estructura</h3>
                <textarea rows="6" style="width:100%; padding: 10px;" placeholder="Describe tu enfoque para resolver este problema..."></textarea>
                <button onclick="finalizarEjecucion()">Completar Serie</button>
            </div>
        </div>
    </div>
    <div class="right-column"></div>
</div>

<script>
    function finalizarEjecucion() {
        alert("Serie completada. Datos enviados a la base de datos.");
    }
</script>
</body>
</html>
