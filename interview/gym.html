<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gimnasio de Habilidades - Irina Hire Selection</title>
    <!-- Módulo de Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../auth-module.js"></script> 
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ESTRUCTURA ESTÁNDAR QUE USAS EN OTRAS PÁGINAS */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #8EE4D5, #B588C0); /* Fondo degradado global */
            margin: 0; padding: 20px; min-height: 100vh;
        }

        /* Contenedor estandarizado con el marco que mencionas */
        .page-wrapper {
            max-width: 1200px; margin: 0 auto; background: #fff;
            border-radius: 16px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 6px solid rgba(255, 255, 255, 0.5); /* Este es el borde del degradado que ves en otras */
        }

        /* HEADER: El módulo inyectará aquí exactamente como en tus otras páginas */
        #blue-header { width: 100%; }

        /* CONTENIDO GYM: Adaptado al nuevo marco */
        .content-gym { 
            height: 70vh; padding: 40px;
            background: 
                linear-gradient(to right, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.8) 50%, #ffffff 100%),
                url('https://i.ibb.co/TDxyQKGg/309eb931-3bcb-44a9-abeb-bc0b6cf996e6-0.jpg') no-repeat center center/cover;
            display: flex; align-items: flex-start; justify-content: flex-end; gap: 20px; position: relative;
        }

        /* TARJETAS - Se mantienen tus efectos */
        .tarjeta-naipe { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); border-radius: 20px; padding: 1.5rem; width: 220px; height: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer; border-bottom: 8px solid #dcdcdc; transition: 0.3s; }
        .tarjeta-naipe:hover { transform: translateY(-10px); }
        .tarjeta-naipe.completado { border-bottom-color: #8EE4D5; }
        .tarjeta-naipe.en_curso { border-bottom-color: #B588C0; }
        .ejercicio-titulo { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.1rem; }
        
        /* BOTÓN CON ANIMACIÓN */
        .btn-luz { position: absolute; bottom: 40px; left: 40px; padding: 1.2rem 2.5rem; font-family: 'Montserrat'; font-weight: 900; color: white; background: linear-gradient(135deg, #B588C0, #8EE4D5); border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="page-wrapper">
    <!-- Punto de inyección estándar del módulo -->
    <div id="blue-header"></div>

    <div class="content-gym">
        <div class="tarjeta-naipe completado">
            <div class="ejercicio-titulo">LÓGICA</div>
        </div>
        <div class="tarjeta-naipe en_curso">
            <div class="ejercicio-titulo">CRISIS</div>
        </div>
        <div class="tarjeta-naipe">
            <div class="ejercicio-titulo">PSICOMETRÍA</div>
        </div>
        <button class="btn-luz" onclick="alert('Iniciando...')">INICIA TU RUTINA</button>
    </div>
</div>

</body>
</html>
