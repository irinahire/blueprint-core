<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gimnasio de Habilidades - Irina Hire Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(to bottom left, #8EE4D5, #B588C0); 
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; 
        }

        .main-container { 
            background: #fff; width: 100%; max-width: 1200px; height: 85vh; 
            display: flex; flex-direction: column; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            border: 4px solid #fff;
        }

        .header-container { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 1rem 3rem; background: #fff; border-bottom: 1px solid #eee;
        }
        .logo { max-width: 120px; }
        
        .gym-title { 
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.6rem; 
            letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(to right, #B588C0, #8EE4D5);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .content-area { 
            flex: 1; 
            background-image: url('https://i.ibb.co/TDxyQKGg/309eb931-3bcb-44a9-abeb-bc0b6cf996e6-0.jpg');
            background-size: cover; background-position: center;
            position: relative; 
            display: flex; justify-content: flex-end; align-items: flex-start; 
            padding-right: 50px; padding-top: 50px; gap: 20px;
        }

        .tarjeta-naipe {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 20px; padding: 1.5rem;
            width: 200px; height: 280px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; justify-content: space-between;
            border-bottom: 8px solid #dcdcdc; cursor: pointer;
        }
        
        .tarjeta-naipe.completado { border-bottom-color: #8EE4D5; }
        .tarjeta-naipe.en_curso { border-bottom-color: #B588C0; }

        .naipe-header { font-size: 0.7rem; font-weight: 800; color: #666; }
        .ejercicio-titulo { font-family: 'Montserrat'; font-weight: 900; font-size: 1rem; color: #222; margin-top: 5px; }
        .ejercicio-desc { font-size: 0.8rem; color: #444; margin-top: 10px; }
        .sets-reps { font-size: 0.75rem; font-weight: bold; border-top: 1px solid #ddd; padding-top: 5px; }

        .btn-rutina {
            position: absolute; bottom: 30px; left: 30px;
            font-family: 'Montserrat'; font-weight: 900; font-size: 0.9rem;
            text-transform: uppercase; color: white; padding: 1rem 2rem;
            background: linear-gradient(135deg, #B588C0, #8EE4D5);
            border: none; border-radius: 8px; cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .btn-rutina:hover { transform: scale(1.05); }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-container">
        <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" class="logo">
        <h1 class="gym-title">GIMNASIO DE HABILIDADES</h1>
    </div>
    <div class="content-area">
        <div class="tarjeta-naipe completado">
            <div><div class="naipe-header">SERIE 01</div><div class="ejercicio-titulo">LÓGICA</div></div>
            <p class="ejercicio-desc">Detección de patrones secuenciales.</p>
            <div class="sets-reps">3 SETS | CARGA ALTA</div>
        </div>
        <div class="tarjeta-naipe en_curso">
            <div><div class="naipe-header">SERIE 02</div><div class="ejercicio-titulo">CRISIS</div></div>
            <p class="ejercicio-desc">Resolución bajo presión.</p>
            <div class="sets-reps">4 SETS | CARGA MÁXIMA</div>
        </div>
        <button class="btn-rutina" onclick="iniciar()">INICIA TU RUTINA</button>
    </div>
</div>

<script>
    function iniciar() {
        const id = new URLSearchParams(window.location.search).get('applicantId');
        alert("Iniciando rutina para: " + id);
    }
</script>

</body>
</html>
