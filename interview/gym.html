<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gimnasio de Habilidades - Irina Hire Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(to bottom left, #8EE4D5, #B588C0); 
            min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; padding: 2rem; 
        }

        .main-container { 
            background: #fff; width: 100%; max-width: 1200px; height: 85vh; 
            display: flex; flex-direction: column; border-radius: 12px; 
            overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            border: 4px solid #fff;
        }

        .header-container { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 1rem 3rem; border-bottom: 1px solid #eee; background: #fff;
        }
        .logo { max-width: 120px; }
        .gym-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.6rem; color: #333; letter-spacing: 2px; text-transform: uppercase; }

        .content-area { 
            flex: 1; 
            /* Degradado de fundido a blanco + Imagen de fondo */
            background: 
                linear-gradient(to right, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.8) 50%, #ffffff 100%),
                url('https://i.ibb.co/TDxyQKGg/309eb931-3bcb-44a9-abeb-bc0b6cf996e6-0.jpg') no-repeat center center/cover;
            position: relative; 
            display: flex;
            justify-content: flex-end; 
            align-items: center;
            padding-right: 50px;
            gap: 20px;
        }

        .tarjeta-naipe {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 1.5rem;
            width: 220px; height: 300px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex; flex-direction: column; justify-content: space-between;
            border-bottom: 8px solid #dcdcdc;
        }

        .tarjeta-naipe:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.25); }
        .tarjeta-naipe.completado { border-bottom-color: #8EE4D5; }
        .tarjeta-naipe.en_curso { border-bottom-color: #B588C0; }

        .naipe-header { font-size: 0.7rem; font-weight: 800; color: #999; margin-bottom: 8px; }
        .ejercicio-titulo { font-family: 'Montserrat'; font-weight: 900; font-size: 1.1rem; color: #222; }
        .ejercicio-desc { font-size: 0.85rem; color: #444; margin-top: 10px; flex: 1; }
        .sets-reps { font-size: 0.75rem; color: #666; font-weight: bold; border-top: 1px solid #eee; padding-top: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-container">
        <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" class="logo">
        <h1 class="gym-title">GIMNASIO DE HABILIDADES</h1>
    </div>

    <div class="content-area">
        <div class="tarjeta-naipe completado" onclick="iniciarEjercicio('logica')">
            <div class="naipe-header">SERIE 01</div>
            <div class="ejercicio-titulo">LÓGICA ALGORÍTMICA</div>
            <p class="ejercicio-desc">Ejecución de flujos y detección de anomalías en secuencias.</p>
            <div class="sets-reps">CARGA: ALTA | 3 SETS</div>
        </div>

        <div class="tarjeta-naipe en_curso" onclick="iniciarEjercicio('situacional')">
            <div class="naipe-header">SERIE 02</div>
            <div class="ejercicio-titulo">GESTIÓN DE CRISIS</div>
            <p class="ejercicio-desc">Resolución de conflictos críticos en entornos de presión.</p>
            <div class="sets-reps">CARGA: MÁXIMA | 4 SETS</div>
        </div>
    </div>
</div>

<script>
    function iniciarEjercicio(tipo) {
        const urlParams = new URLSearchParams(window.location.search);
        const applicantId = urlParams.get('applicantId');
        
        if (!applicantId) {
            alert("Error: No se encontró el ID del postulante.");
            return;
        }
        
        console.log(`Iniciando ejercicio ${tipo} para postulante: ${applicantId}`);
        // Aquí conectaremos con la lógica de Supabase cuando definas el siguiente paso
    }
</script>

</body>
</html>
