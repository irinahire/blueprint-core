<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gimnasio de Habilidades - Irina Hire Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../auth-module.js"></script> 
    <script src="../hbt_migracion_id.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --fucsia: #bc8abf; 
            --turquesa: #96e8da;
            --irina-gradient: linear-gradient(to right, var(--fucsia) 0%, var(--turquesa) 100%); 
            --bg-dark: #05070a; 
        }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        /* ESTRUCTURA EXTERIOR */
        .outer-frame { padding: 8px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; height: 85vh; display: flex; position: relative; }
        .app-container { background: #000; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        
        #blue-header { width: 100%; flex-shrink: 0; }
        
        .content-area { 
            flex: 1; 
            background: 
                linear-gradient(to right, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 60%, #000 100%),
                url('https://i.ibb.co/TDxyQKGg/309eb931-3bcb-44a9-abeb-bc0b6cf996e6-0.jpg') no-repeat center center/cover;
            position: relative; display: flex; justify-content: flex-end; align-items: flex-start; 
            padding: 50px; gap: 20px;
        }

        .tarjeta-naipe { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
            border-radius: 20px; padding: 1.5rem; width: 220px; height: 300px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer; 
            transition: all 0.3s ease; display: flex; flex-direction: column; 
            justify-content: space-between; border-bottom: 8px solid #dcdcdc; z-index: 5; 
        }
        .tarjeta-naipe:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.25); }
        .tarjeta-naipe.completado { border-bottom-color: var(--turquesa); }
        .tarjeta-naipe.en_curso { border-bottom-color: var(--fucsia); }

        .naipe-header { font-size: 0.7rem; font-weight: 800; color: #999; margin-bottom: 8px; }
        .ejercicio-titulo { font-family: 'Montserrat'; font-weight: 900; font-size: 1.1rem; color: #222; }
        .ejercicio-desc { font-size: 0.85rem; color: #444; margin-top: 10px; flex: 1; line-height: 1.4; }
        .sets-reps { font-size: 0.75rem; color: #666; font-weight: bold; border-top: 1px solid #eee; padding-top: 10px; }

        /* BOTÓN CON ANIMACIÓN RECUPERADA */
        .btn-container { position: absolute; bottom: 50px; left: 50px; }
        .btn-luz { 
            position: relative; padding: 1.2rem 2.5rem; font-family: 'Montserrat'; font-weight: 900; 
            font-size: 0.9rem; text-transform: uppercase; color: white;
            background: linear-gradient(135deg, var(--fucsia), var(--turquesa)); 
            border: none; border-radius: 8px; cursor: pointer; z-index: 10;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3); transition: transform 0.2s;
        }
        .btn-luz::before {
            content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: linear-gradient(45deg, var(--fucsia), var(--turquesa), var(--fucsia), var(--turquesa));
            background-size: 400%; border-radius: 10px; z-index: -1; 
            opacity: 0; transition: opacity 0.3s ease;
        }
        .btn-luz:hover::before { opacity: 1; animation: glow 2s linear infinite; }
        @keyframes glow { 0% { background-position: 0 0; } 100% { background-position: 400% 0; } }

        #mensaje-entrenamiento { display: none; text-align: center; padding: 50px; font-size: 1.5rem; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-container">
        <div id="blue-header"></div>
        
        <div class="content-area" id="area-juego">
            <div class="tarjeta-naipe completado">
                <div><div class="naipe-header">SERIE 01</div><div class="ejercicio-titulo">LÓGICA</div></div>
                <p class="ejercicio-desc">Ejecución de flujos y detección de anomalías.</p>
                <div class="sets-reps">3 SETS | CARGA ALTA</div>
            </div>
            <div class="tarjeta-naipe en_curso">
                <div><div class="naipe-header">SERIE 02</div><div class="ejercicio-titulo">CRISIS</div></div>
                <p class="ejercicio-desc">Resolución de conflictos en alta presión.</p>
                <div class="sets-reps">4 SETS | CARGA MÁXIMA</div>
            </div>
            <div class="tarjeta-naipe">
                <div><div class="naipe-header">SERIE 03</div><div class="ejercicio-titulo">PSICOMETRÍA</div></div>
                <p class="ejercicio-desc">Evaluación adaptativa y estrés.</p>
                <div class="sets-reps">2 SETS | CARGA MEDIA</div>
            </div>
            <div class="btn-container">
                <button class="btn-luz" onclick="iniciarRutina()">INICIA TU RUTINA</button>
            </div>
        </div>
        
        <div id="mensaje-entrenamiento"></div>
    </div>
</div>

<script>
    function iniciarRutina() {
        const id = localStorage.getItem('applicantId') || "Invitado";
        document.getElementById('area-juego').style.display = 'none';
        const msg = document.getElementById('mensaje-entrenamiento');
        msg.style.display = 'block';
        msg.innerHTML = `Entrenamiento activado para: ${id}`;
    }

    // Vigilante unificado igual al de psicométrico
    window.sbClient.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) {
            console.log("--- [VIGILANTE GIMNASIO] Sesión detectada tras login. Ejecutando migración... ---");
            verificarYMigrarApplicantId(session);
        }
    });
</script>
</body>
</html>
