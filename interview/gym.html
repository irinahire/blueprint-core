<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gimnasio de Habilidades - Irina Hire Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../auth-module.js"></script> 
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ESTILO GLOBAL IGUAL A TUS OTRAS PÁGINAS */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #000; /* Fondo negro como en las otras */
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; 
        }

        /* EL MARCO CON GRADIENTE (Estructura de tus otras páginas) */
        .main-container { 
            width: 100%; max-width: 1200px; height: 85vh; 
            display: flex; flex-direction: column; border-radius: 20px; 
            overflow: hidden; 
            /* Borde de gradiente que tienen tus otras páginas */
            background: linear-gradient(135deg, #8EE4D5, #B588C0); 
            padding: 4px; 
        }

        /* Contenedor interno que oculta el fondo para dejar solo el borde */
        .inner-wrapper {
            background: #000; /* Fondo interno */
            width: 100%; height: 100%;
            border-radius: 16px;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Cabecera donde el script inyecta el Auth */
        #blue-header { width: 100%; flex-shrink: 0; }

        /* Área de contenido (Tu diseño original intacto) */
        .content-area { 
            flex: 1; 
            background: 
                linear-gradient(to right, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.6) 60%, #ffffff 100%),
                url('https://i.ibb.co/TDxyQKGg/309eb931-3bcb-44a9-abeb-bc0b6cf996e6-0.jpg') no-repeat center center/cover;
            position: relative; 
            display: flex; justify-content: flex-end; align-items: flex-start; 
            padding-right: 50px; padding-top: 50px; gap: 20px;
        }

        /* Tus tarjetas y efectos intactos */
        .tarjeta-naipe { 
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); 
            border-radius: 20px; padding: 1.5rem; width: 220px; height: 300px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); cursor: pointer; 
            transition: all 0.3s ease; display: flex; flex-direction: column; 
            justify-content: space-between; border-bottom: 8px solid #dcdcdc; z-index: 5; 
        }
        .tarjeta-naipe:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.25); }
        .tarjeta-naipe.completado { border-bottom-color: #8EE4D5; }
        .tarjeta-naipe.en_curso { border-bottom-color: #B588C0; }

        .naipe-header { font-size: 0.7rem; font-weight: 800; color: #999; margin-bottom: 8px; }
        .ejercicio-titulo { font-family: 'Montserrat'; font-weight: 900; font-size: 1.1rem; color: #222; }
        .ejercicio-desc { font-size: 0.85rem; color: #444; margin-top: 10px; flex: 1; line-height: 1.4; }
        .sets-reps { font-size: 0.75rem; color: #666; font-weight: bold; border-top: 1px solid #eee; padding-top: 10px; }

        /* Botón con animación original */
        .btn-container { position: absolute; bottom: 30px; left: 30px; }
        .btn-luz { 
            position: relative; padding: 1.2rem 2.5rem; font-family: 'Montserrat'; font-weight: 900; 
            font-size: 0.9rem; text-transform: uppercase; color: white;
            background: linear-gradient(135deg, #B588C0, #8EE4D5); 
            border: none; border-radius: 8px; cursor: pointer; z-index: 10;
            box-shadow: 0 8px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        .btn-luz::before {
            content: ''; position: absolute; top: -3px; left: -3px; right: -3px; bottom: -3px;
            background: linear-gradient(45deg, #B588C0, #8EE4D5, #B588C0, #8EE4D5);
            background-size: 400%; border-radius: 10px; z-index: -1; 
            opacity: 0; transition: opacity 0.3s ease;
        }
        .btn-luz:hover::before { opacity: 1; animation: glow 2s linear infinite; }
        @keyframes glow { 0% { background-position: 0 0; } 100% { background-position: 400% 0; } }

        #mensaje-entrenamiento { display: none; text-align: center; padding: 50px; font-size: 1.5rem; color: #333; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="inner-wrapper">
        <div id="blue-header"></div>

        <div class="content-area" id="area-juego">
            <div class="tarjeta-naipe completado">
                <div><div class="naipe-header">SERIE 01</div><div class="ejercicio-titulo">LÓGICA</div></div>
                <p class="ejercicio-desc">Ejecución de flujos y detección de anomalías.</p>
                <div class="sets-reps">3 SETS | CARGA ALTA</div>
            </div>
            <div class="tarjeta-naipe en_curso">
                <div><div class="naipe-header">SERIE 02</div><div class="ejercicio-titulo">CRISIS</div></div>
                <p class="ejercicio-desc">Resolución de conflictos en alta presión.</p>
                <div class="sets-reps">4 SETS | CARGA MÁXIMA</div>
            </div>
            <div class="tarjeta-naipe pendiente">
                <div><div class="naipe-header">SERIE 03</div><div class="ejercicio-titulo">PSICOMETRÍA</div></div>
                <p class="ejercicio-desc">Evaluación adaptativa y estrés.</p>
                <div class="sets-reps">2 SETS | CARGA MEDIA</div>
            </div>
            <div class="btn-container">
                <button class="btn-luz" onclick="iniciarRutina()">INICIA TU RUTINA</button>
            </div>
        </div>
        
        <div id="mensaje-entrenamiento"></div>
    </div>
</div>

<script>
    function iniciarRutina() {
        const id = new URLSearchParams(window.location.search).get('applicantId') || "Invitado";
        const areaJuego = document.getElementById('area-juego');
        const mensaje = document.getElementById('mensaje-entrenamiento');
        areaJuego.style.display = 'none';
        mensaje.style.display = 'block';
        mensaje.innerHTML = `Entrenamiento personalizado activado para: <br> ID: ${id}`;
    }
</script>
</body>
</html>
