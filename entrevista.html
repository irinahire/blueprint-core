<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irina Hire Selection | Portal de Entrevista</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* DEGRADÉ INVERTIDO: Fucsia a la izquierda, Turquesa a la derecha */
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%);
            --fucsia-solid: #bc8abf;
            --bg-dark: #05070a;
            --text-dark: #111827;
            --text-gray: #4b5563;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* MARCO CON DEGRADÉ INVERTIDO */
        .outer-frame {
            padding: 10px;
            background: var(--irina-gradient);
            border-radius: 50px;
            width: 92%; max-width: 1150px;
            height: 85vh;
            display: flex;
            position: relative;
        }

        .app-container {
            background: white;
            width: 100%; height: 100%;
            border-radius: 40px;
            display: flex; flex-direction: column;
            position: relative;
            /* Quitamos overflow hidden para que la tarjeta no se corte */
        }

        /* VINCHA CON DEGRADÉ INVERTIDO */
        .top-vincha {
            width: 100%; height: 80px;
            background: var(--irina-gradient);
            display: flex; align-items: center; justify-content: flex-end;
            padding: 0 40px; box-sizing: border-box;
            z-index: 20;
            border-radius: 40px 40px 0 0;
        }

        .vincha-title {
            font-weight: 800; font-size: 28px;
            text-transform: uppercase;
            background: white;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: var(--irina-gradient);
            /* BORDE BLANCO PARA RESALTAR */
            filter: drop-shadow(1.5px 0 0 white) drop-shadow(-1.5px 0 0 white) drop-shadow(0 1.5px 0 white) drop-shadow(0 -1.5px 0 white);
        }

        .main-body { 
            flex: 1; display: flex; 
            position: relative; 
            border-radius: 0 0 40px 40px;
            overflow: hidden; /* Esto mantiene a Irina dentro de su panel */
        }

        .info-side {
            flex: 1.2; padding: 50px 60px;
            display: flex; flex-direction: column;
            justify-content: center;
        }

        .section-box h3 { font-size: 18px; font-weight: 800; margin-bottom: 15px; color: var(--text-dark); border-bottom: 2px solid #f3f4f6; padding-bottom: 5px; display: inline-block; }
        .checklist { list-style: none; padding: 0; margin: 0; }
        .checklist li { margin-bottom: 12px; font-size: 13px; display: flex; align-items: center; gap: 10px; color: var(--text-gray); }

        .visual-side {
            flex: 1; position: relative;
            background: #fdfdfd;
            border-left: 1px solid #f3f4f6;
        }

        .irina-bg {
            position: absolute; 
            top: 0; right: 0;
            height: 100%; width: auto;
            object-fit: cover;
        }

        /* TARJETA DNI: Ahora con z-index alto para que no se corte */
        .dni-card {
            background: white;
            padding: 35px; border-radius: 25px;
            width: 300px; text-align: center;
            z-index: 99; /* Máxima prioridad */
            border: 1px solid #e5e7eb;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            position: absolute;
            top: 50%; 
            left: 50%; /* Centrado absoluto respecto al contenedor principal */
            transform: translate(-50%, -50%);
        }

        #dni-input-center {
            width: 100%; padding: 18px;
            border: 2px solid #f3f4f6; border-radius: 14px;
            font-size: 20px; text-align: center;
            margin-bottom: 5px; font-weight: 700;
            box-sizing: border-box; background: #f9fafb;
            outline: none;
        }

        #dni-err-center { font-size: 12px; color: #ef4444; margin-bottom: 15px; font-weight: 600; }

        #call-irina-center {
            width: 100%; height: 58px;
            background: var(--fucsia-solid);
            color: white; border: none; border-radius: 14px;
            font-weight: 800; cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 25px rgba(188, 138, 191, 0.35);
        }

        .footer-info {
            position: absolute; bottom: 25px; left: 60px;
            font-size: 10px; color: #9ca3af; font-weight: 600;
            z-index: 5;
        }


        /* --- ESTILO PARA TRANSFORMAR EL BOTÓN VERDE DE VAPI --- */

/* 1. Seleccionamos el botón que crea el script */
.vapi-btn {
    /* Quitamos el círculo y lo hacemos rectangular */
    border-radius: 14px !important; 
    width: 280px !important; 
    height: 60px !important;
    
    /* Aplicamos tu branding (Fucsia a Turquesa) */
    background: linear-gradient(to right, #bc8abf, #96e8da) !important;
    
    /* Lo posicionamos flotando abajo al centro */
    position: fixed !important;
    bottom: 5vh !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    
    /* Estética de la sombra */
    box-shadow: 0 15px 35px rgba(188, 138, 191, 0.4) !important;
    
    /* Animación para que no aparezca de golpe */
    transition: all 0.3s ease-in-out !important;
    
    /* Importante: para que se vea sobre todo lo demás */
    z-index: 999999 !important;
}

/* Opcional: Cambiamos el color del icono dentro del botón si es necesario */
.vapi-btn svg {
    fill: white !important;
    width: 25px !important;
    height: 25px !important;
}
    </style>
</head>
<body>

    <div class="outer-frame">
        <div class="app-container">
            <div class="dni-card">
                <div style="font-size:10px; font-weight:800; color:#9ca3af; margin-bottom:15px; letter-spacing:1px;">VALIDACIÓN DE POSTULANTE</div>
                <input id="dni-input-center" placeholder="DNI del Postulante" inputmode="numeric">
                <div id="dni-err-center" style="display:none;">⚠️ DNI no válido</div>
                <button id="call-irina-center">VALIDAR Y COMENZAR</button>
            </div>

            <div class="top-vincha">
                <div class="vincha-title">Irina Hire</div>
            </div>

            <div class="main-body">
                <div class="info-side">
                    <div class="section-box">
                        <h3>Indicaciones de Calidad</h3>
                        <ul class="checklist">
                            <li>🎧 <b>Audio:</b> Se requiere uso de headset.</li>
                            <li>🤫 <b>Entorno:</b> Espacio privado y libre de ruidos.</li>
                            <li>⚖️ <b>Legal:</b> Al iniciar acepta términos y condiciones.</li>
                        </ul>
                    </div>
                </div>

                <div class="visual-side">
                    <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
                </div>
            </div>

            <div class="footer-info">POWERED BY BLUE LAB</div>
        </div>
    </div>

    <script>
    (function(){
      var KEY = "403b3e01-61b7-4bc2-9c23-67a1f29c564d";
      var ASST = "183129be-11c6-479d-87d3-bc390c593600";
      var VAR_NAME = "customer_dni";

      function loadVapi(){
        if(window.vapiSDK) return Promise.resolve();
        return new Promise(function(res){
          var s=document.createElement("script");
          s.src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
          s.async=true; s.onload=res;
          document.head.appendChild(s);
        });
      }

      setTimeout(function(){
        var btn = document.getElementById("call-irina-center");
        var input = document.getElementById("dni-input-center");
        var err = document.getElementById("dni-err-center");

        btn.onclick = function(){
          var v = (input.value || "").replace(/\D/g, "");
          if(v.length < 6){ err.style.display="block"; return; }
          err.style.display="none";
          btn.innerText = "CONECTANDO...";
          loadVapi().then(function(){
            window.vapiSDK.run({ 
              apiKey: KEY, assistant: ASST,
              assistantOverrides: { variableValues: { [VAR_NAME]: v } }
            });
          });
        };
      }, 1000);
    })();
    </script>
</body>
</html>
