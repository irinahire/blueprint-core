<script>
(function(){
  // 1. CONFIGURACIÓN
  var KEY_PUBLIC = "403b3e01-61b7-4bc2-9c23-67a1f29c564d";
  var WORKER_URL = "https://web.irinahire-ia.workers.dev"; // Tu Worker de Cloudflare

  function loadVapi(){
    if(window.vapiSDK) return Promise.resolve();
    return new Promise(function(res){
      var s=document.createElement("script");
      s.src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
      s.async=true; s.onload=res;
      document.head.appendChild(s);
    });
  }

  // Función para controlar la estética del botón de Vapi
  const updateVapiButton = (text, color) => {
    const vBtn = document.querySelector('.vapi-btn');
    if(vBtn) {
      vBtn.setAttribute('data-text', text);
      if(color) vBtn.style.background = color;
    }
  };

  setTimeout(function(){
    var btn = document.getElementById("call-irina-center");
    var input = document.getElementById("dni-input-center");

    btn.onclick = async function(){
      var v = (input.value || "").replace(/\D/g, "");
      if(v.length < 6){ alert("Por favor, ingrese un DNI válido."); return; }
      
      document.querySelector(".dni-card").style.display = "none";
      btn.innerText = "CONECTANDO CON IRINA...";

      try {
        // 2. PEDIMOS LA LLAMADA AL WORKER (Esto inyecta el DNI y el Webhook de Make)
        const response = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ dni: v })
        });

        const callData = await response.json();

        if(!response.ok) throw new Error("Error en Worker");

        // 3. INICIAMOS EL SDK CON LA URL SEGURA
        await loadVapi();
        const vapi = window.vapiSDK.run({
          apiKey: KEY_PUBLIC,
          webCallUrl: callData.webCallUrl // Usamos la URL que generó el Worker
        });

        // 4. CONTROL DE ESTADOS DEL BOTÓN
        const checkBtn = setInterval(() => {
          const vBtn = document.querySelector('.vapi-btn');
          if(vBtn) {
            updateVapiButton("HABLAR CON IRINA");
            clearInterval(checkBtn);
          }
        }, 100);

        vapi.on('call-start', () => updateVapiButton("FINALIZAR LLAMADA", "#ff4b4b"));
        
        vapi.on('call-end', () => {
          updateVapiButton("ENTREVISTA FINALIZADA", "gray");
          const vBtn = document.querySelector('.vapi-btn');
          if(vBtn) vBtn.style.pointerEvents = "none";
        });

      } catch (err) {
        console.error(err);
        alert("Hubo un problema al iniciar la conexión. Reintente en unos instantes.");
        document.querySelector(".dni-card").style.display = "flex";
        btn.innerText = "VALIDAR Y COMENZAR";
      }
    };
  }, 1000);
})();
</script>
