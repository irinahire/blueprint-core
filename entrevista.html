<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrevista Virtual | Irina Hire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #05070a;
            --irina-mint: #96e8da;
            --irina-purple: #bc8abf;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a2a2a, var(--bg-dark));
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        /* Efecto de Luces de Fondo */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--irina-mint);
            filter: blur(150px);
            opacity: 0.1;
            top: 10%;
            left: 10%;
            z-index: 0;
        }

        #irina-fixed-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            pointer-events: auto;
        }

        .dni-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .brand-logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--irina-mint), var(--irina-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .label {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.4);
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 18px;
            font-size: 20px;
            color: white;
            text-align: center;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--irina-mint);
            background: rgba(255,255,255,0.08);
            box-shadow: 0 0 20px rgba(150, 232, 218, 0.2);
        }

        button {
            width: 100%;
            height: 60px;
            background: var(--irina-mint);
            color: #05070a;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(150, 232, 218, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(150, 232, 218, 0.4);
        }

        button:active { transform: scale(0.98); }

        .status-msg {
            font-size: 12px;
            margin-top: 20px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
        }

        #dni-err-center {
            color: #ff5f5f;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

    <div id="irina-fixed-container">
        <div class="dni-card">
            <div class="brand-logo">IRINA HIRE</div>
            <div class="label">Validación de Postulante</div>
            
            <input id="dni-input-center" placeholder="00.000.000" inputmode="numeric">
            <div id="dni-err-center">DNI no reconocido o inválido</div>

            <button id="call-irina-center">COMENZAR ENTREVISTA</button>
            
            <div class="status-msg" id="status-text">Asegurate de estar en un lugar silencioso.</div>
        </div>
    </div>

    <script>
    (function(){
      var KEY = "403b3e01-61b7-4bc2-9c23-67a1f29c564d";
      var ASST = "183129be-11c6-479d-87d3-bc390c593600";
      var VAR_NAME = "customer_dni";

      function loadVapi(){
        if(window.vapiSDK) return Promise.resolve();
        return new Promise(function(res){
          var s=document.createElement("script");
          s.src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
          s.async=true; s.onload=res;
          document.head.appendChild(s);
        });
      }

      var btn = document.getElementById("call-irina-center");
      var input = document.getElementById("dni-input-center");
      var err = document.getElementById("dni-err-center");
      var statusText = document.getElementById("status-text");

      btn.onclick = function(){
        var v = (input.value || "").replace(/\D/g, "");
        if(v.length < 6){ 
            err.style.display="block"; 
            input.style.borderColor = "#ff5f5f";
            return; 
        }
        
        err.style.display="none";
        input.style.borderColor = "rgba(255,255,255,0.1)";
        btn.innerText = "CONECTANDO...";
        btn.style.background = "#bc8abf";
        statusText.innerText = "Iniciando enlace seguro con Irina...";

        loadVapi().then(function(){
          window.vapiSDK.run({ 
            apiKey: KEY, 
            assistant: ASST,
            assistantOverrides: { variableValues: { [VAR_NAME]: v } }
          });
          
          window.vapiSDK.on('call-start', () => {
              btn.innerText = "EN LLAMADA";
              btn.style.background = "#ff5f5f";
              btn.style.color = "white";
              statusText.innerText = "Irina te está escuchando...";
          });

          window.vapiSDK.on('call-end', () => {
              btn.innerText = "SESIÓN FINALIZADA";
              btn.style.background = "#22c55e";
              statusText.innerText = "Análisis de idoneidad en proceso.";
          });
        });
      };
    })();
    </script>
</body>
</html>
