<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irina Hire Selection | Entrevista Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --irina-gradient: linear-gradient(135deg, #96e8da 0%, #bc8abf 100%);
            --irina-green: #10b981;
            --bg-dark: #05070a;
            --text-dark: #111827;
            --text-gray: #4b5563;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* MARCO DEGRADÉ */
        .outer-frame {
            padding: 10px;
            background: var(--irina-gradient);
            border-radius: 50px;
            width: 92%; max-width: 1100px;
            height: 85vh;
            display: flex;
            box-shadow: 0 0 80px rgba(150, 232, 218, 0.3);
        }

        .app-container {
            background: white;
            width: 100%; height: 100%;
            border-radius: 42px;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* VINCHA SUPERIOR CON LOGO */
        .top-vincha {
            width: 100%; height: 85px;
            background: var(--irina-gradient);
            display: flex; align-items: center;
            padding: 0 45px; box-sizing: border-box;
            z-index: 20;
        }

        .logo-ihs {
            height: 50px; width: auto;
            border-radius: 10px;
        }

        .main-body {
            flex: 1; display: flex;
            position: relative;
        }

        /* PANEL IZQUIERDO: TEXTO */
        .info-side {
            flex: 1.2; padding: 60px;
            display: flex; flex-direction: column;
            justify-content: center; z-index: 5;
        }

        .brand-title {
            font-size: 38px; font-weight: 800;
            background: var(--irina-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        /* PANEL DERECHO: IRINA */
        .visual-side {
            flex: 1; position: relative;
            background: #fdfdfd;
            border-left: 1px solid #f3f4f6;
            display: flex; align-items: center; justify-content: center;
        }

        .irina-bg {
            position: absolute; bottom: 0; right: 0;
            height: 95%; /* Ajustada para no chocar con la vincha */
            object-fit: contain; z-index: 1;
        }

        /* TARJETA DNI (MÁS CHICA Y CENTRADA) */
        .dni-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 35px; /* Reducido */
            border-radius: 30px;
            width: 280px; /* Reducido */
            text-align: center;
            z-index: 10; border: 1px solid #e5e7eb;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            
            /* NUEVA UBICACIÓN: MÁS CENTRADA Y ARRIBA */
            position: absolute;
            top: 30%; /* Subimos la tarjeta */
            left: 50%;
            transform: translateX(-50%); /* Centramos horizontalmente */
        }

        input {
            width: 100%; padding: 18px; /* Reducido */
            border: 2px solid #e5e7eb; border-radius: 14px;
            font-size: 20px; text-align: center;
            margin-bottom: 25px; font-weight: 700;
            box-sizing: border-box; background: #f9fafb;
        }

        /* EL BOTÓN RECTANGULAR ESTÁTICO (CORREGIDO) */
        #call-irina-btn {
            width: 100%; height: 65px; /* Robusto pero no gigante */
            background: var(--irina-green);
            border: none; border-radius: 14px;
            color: white; font-weight: 800;
            font-size: 16px; cursor: pointer;
            transition: background 0.3s;
            display: block; /* Asegura área de clic total */
            text-transform: uppercase;
        }

        #call-irina-btn:hover { background: #059669; transform: none; } /* ESTÁTICO */

        .footer-info {
            position: absolute; bottom: 30px; left: 65px;
            font-size: 10px; color: #9ca3af; text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            
            <div class="top-vincha">
                <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" class="logo-ihs" alt="Logo IHS">
            </div>

            <div class="main-body">
                <div class="info-side">
                    <h1 class="brand-title">IRINA HIRE</h1>
                    <div style="margin-bottom:30px">
                        <p style="font-size:14px; color:var(--text-gray); line-height:1.7">
                            Portal oficial de evaluación de <b>Blueprint Integrations Lab</h1>
