<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irina Hire Selection | Entrevista Virtual</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --irina-gradient: linear-gradient(135deg, #96e8da 0%, #bc8abf 100%);
            --bg-dark: #05070a;
            --text-dark: #111827;
            --text-gray: #4b5563;
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .outer-frame {
            padding: 10px;
            background: var(--irina-gradient);
            border-radius: 50px;
            width: 90%; max-width: 1100px;
            height: 82vh;
            display: flex;
            box-shadow: 0 0 80px rgba(150, 232, 218, 0.3);
        }

        .app-container {
            background: white;
            width: 100%; height: 100%;
            border-radius: 40px;
            display: flex; flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* VINCHA SUPERIOR (Solo Decorativa ahora) */
        .top-vincha {
            width: 100%; height: 60px;
            background: var(--irina-gradient);
            z-index: 20;
        }

        .main-body { flex: 1; display: flex; position: relative; }

        /* PANEL IZQUIERDO */
        .info-side {
            flex: 1; padding: 40px 60px;
            display: flex; flex-direction: column;
            justify-content: flex-start; z-index: 5;
        }

        /* LOGO EN LA PARTE BLANCA */
        .logo-container { margin-bottom: 30px; }
        .logo-ihs { height: 60px; width: auto; }

        .brand-title {
            font-size: 36px; font-weight: 800;
            background: var(--irina-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0 0 20px 0;
        }

        /* PANEL DERECHO */
        .visual-side {
            flex: 1; position: relative;
            background: #fdfdfd;
            border-left: 1px solid #f3f4f6;
            display: flex; align-items: center; justify-content: center;
        }

        .irina-bg {
            position: absolute; bottom: 0; right: 0;
            height: 100%; object-fit: contain; z-index: 1;
        }

        /* TARJETA DNI */
        .dni-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 35px; border-radius: 30px;
            width: 290px; text-align: center;
            z-index: 10; border: 1px solid #e5e7eb;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            position: relative;
        }

        input {
            width: 100%; padding: 18px;
            border: 2px solid #e5e7eb; border-radius: 14px;
            font-size: 20px; text-align: center;
            margin-bottom: 25px; font-weight: 700;
            box-sizing: border-box; background: #f9fafb;
        }

        /* BOTÓN CON DEGRADÉ (Recuperado y mejorado) */
        #call-irina-btn {
            width: 100%; height: 70px; /* Más alto y ancho */
            background: var(--irina-gradient);
            border: none; border-radius: 16px;
            color: white; font-weight: 800;
            font-size: 16px; cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        #call-irina-btn:hover { opacity: 0.9; }

        .footer-info {
            position: absolute; bottom: 25px; left: 60px;
            font-size: 10px; color: #9ca3af; font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            
            <div class="top-vincha"></div>

            <div class="main-body">
                <div class="info-side">
                    <div class="logo-container">
                        <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" class="logo-ihs" alt="Logo IHS">
                    </div>

                    <h1 class="brand-title">IRINA HIRE</h1>
                    <div style="margin-bottom:25px">
                        <p style="font-size:14px; color:var(--text-gray); line-height:1.6">
                            Portal oficial de evaluación de <b>Blueprint Integrations Lab</b>.
                        </p>
                    </div>
                    <ul style="list-style:none; padding:0; font-size:12px; color:var(--text-dark)">
                        <li style="margin-bottom:12px">🎧 <b>Audio:</b> Use headset para mayor nitidez.</li>
                        <li style="margin-bottom:12px">👤 <b>Entorno:</b> Espacio privado y sin ruidos.</li>
                        <li style="margin-bottom:12px">⚖️ <b>Legal:</b> Al iniciar acepta términos de servicio.</li>
                    </ul>
                </div>

                <div class="visual-side">
                    <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
                    <div class="dni-card">
                        <div style="font-size:11px; font-weight:800; color:#9ca3af; margin-bottom:20px; letter-spacing:1px">DNI DEL POSTULANTE</div>
                        <input type="text" id="dni-input" placeholder="00.000.000">
                        <button id="call-irina-btn">VALIDAR Y COMENZAR</button>
                    </div>
                </div>
            </div>

            <div class="footer-info">
                SOPORTE: soporte@bluelab.online | POWERED BY BLUE LAB
            </div>
        </div>
    </div>

    <script>
    (function(){
      var KEY = "403b3e01-61b7-4bc2-9c23-67a1f29c564d";
      var ASST = "183129be-11c6-479d-87d3-bc390c593600";
      
      function loadVapi(){
        if(window.vapiSDK) return Promise.resolve();
        return new Promise(function(res){
          var s=document.createElement("script");
          s.src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
          s.async=true; s.onload=res;
          document.head.appendChild(s);
        });
      }

      var btn = document.getElementById("call-irina-btn");
      btn.onclick = function(){
        btn.innerText = "CONECTANDO...";
        loadVapi().then(function(){
          window.vapiSDK.run({ apiKey: KEY, assistant: ASST });
        });
      };
    })();
    </script>
</body>
</html>
