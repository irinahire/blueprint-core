<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Blic - Irina Hire Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom left, #8EE4D5, #B588C0); min-height: 100vh; padding: 2rem; }
        
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; background: white; padding: 1rem 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { max-width: 120px; }
        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }

        .blic-card { 
            background: white; border-radius: 12px; padding: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex; flex-direction: column; gap: 8px; aspect-ratio: 1 / 1.5;
            transition: transform 0.2s;
        }

        /* Lógica de Colores Dinámica */
        .bg-marron { background-color: #8B4513; color: white; }
        .bg-rojo { background-color: #e74c3c; color: white; }
        .bg-amarillo { background-color: #f1c40f; color: black; }
        .bg-verde { background-color: #2ecc71; color: white; }
        
        /* Efecto Cómic Verde Esmeralda (90-97) */
        .bg-emerald-comic { 
            background-color: #2ecc71;
            background-image: radial-gradient(#ffffff 15%, transparent 16%);
            background-size: 10px 10px; 
            color: white;
        }

        /* Degradado animado Irina (98-100) */
        .bg-irina-animado { 
            background: linear-gradient(135deg, #8EE4D5, #B588C0, #8EE4D5); 
            background-size: 300% 300%; 
            animation: moveGradient 4s linear infinite; 
            color: white;
        }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .title-score { font-size: 14px; font-weight: 900; width: 100%; display: flex; justify-content: space-between; }
        .radar-container { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
        .icons-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 5px; padding: 0 10px; }
        .icon { background: rgba(255,255,255,0.3); aspect-ratio: 1 / 1; border-radius: 4px; transform: scale(0.85); }
        .buttons-group { display: flex; gap: 5px; margin-top: 15px; }
        .btn-card { 
            flex: 1; padding: 8px 2px; border: none; border-radius: 6px; cursor: pointer; 
            font-size: 8px; font-weight: bold; background: #222; color: white;
            box-shadow: 0 3px 0 #000; transition: all 0.1s;
        }
    </style>
</head>
<body>

    <div class="header-top">
        <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" class="logo">
        <h2>Dashboard Blic - Talentos</h2>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') center/cover;"></div>
    </div>

    <div class="grid-container" id="dashboard"></div>

<script>
    const candidatos = [
        { id: "02546", score: 99 }, { id: "01123", score: 94 }, 
        { id: "08892", score: 45 }, { id: "03341", score: 65 },
        { id: "04455", score: 78 }, { id: "09981", score: 85 }
    ];
    
    function getCardClass(score) {
        if (score >= 98) return 'bg-irina-animado';
        if (score >= 90) return 'bg-emerald-comic';
        if (score >= 80) return 'bg-verde';
        if (score >= 60) return 'bg-amarillo';
        if (score >= 50) return 'bg-rojo';
        return 'bg-marron';
    }
    
    const grid = document.getElementById('dashboard');
    candidatos.forEach((c, index) => {
        const card = document.createElement('div');
        card.className = `blic-card ${getCardClass(c.score)}`;
        card.innerHTML = `
            <div class="title-score">
                <span>BLIC #${c.id}</span>
                <span>SCORE: ${c.score}</span>
            </div>
            <div class="radar-container"><canvas id="radar-${index}"></canvas></div>
            <div class="icons-grid">${Array(6).fill('<div class="icon"></div>').join('')}</div>
            <div class="buttons-group">
                <button class="btn-card">CV</button>
                <button class="btn-card">AUDIO</button>
                <button class="btn-card">REPORT</button>
            </div>
        `;
        grid.appendChild(card);
        
        new Chart(document.getElementById(`radar-${index}`), {
            type: 'radar',
            data: {
                labels: ['Ext', 'Ama', 'Res', 'Est', 'Ape'],
                datasets: [{ data: [Math.random()*5, Math.random()*5, Math.random()*5, Math.random()*5, Math.random()*5], backgroundColor: 'rgba(255,255,255,0.3)', borderColor: '#fff' }]
            },
            options: { plugins: { legend: { display: false } }, scales: { r: { beginAtZero: true, max: 5, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.2)' } } } }
        });
    });
</script>
</body>
</html>
