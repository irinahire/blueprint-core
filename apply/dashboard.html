<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #8EE4D5, #B588C0); 
            min-height: 100vh; 
            padding: 2rem; 
            margin: 0;
        }
        /* Contenedor central blanco */
        .main-container { 
            background: rgba(255, 255, 255, 0.95); 
            border-radius: 20px; 
            padding: 2rem; 
            max-width: 1200px; 
            margin: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .blic-card { 
            background: white; border-radius: 12px; padding: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            display: flex; flex-direction: column; gap: 8px; 
            aspect-ratio: 1 / 1.5; cursor: pointer; transition: 0.3s;
        }
        .blic-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        /* Clases de color (degradados) */
        .bg-irina-animado { background: linear-gradient(135deg, #8EE4D5, #B588C0); color: white; }
        
        .radar-container { flex: 4; min-height: 0; display: flex; align-items: center; justify-content: center; }
        .icons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 10px; }
        .icon-box { background: rgba(0,0,0,0.1); aspect-ratio: 1/1; border-radius: 4px; display: flex; align-items: center; justify-content: center; }
        
        /* Modal */
        #modal-perfil { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index:1000; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header">
            <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" style="max-width: 150px;">
            <img src="https://i.ibb.co/VMyD7QZ/irina-perfil.png" style="max-width: 50px; border-radius: 50%;">
        </div>
        <div class="grid-container" id="dashboard"></div>
    </div>

    <script>
        const sb = supabase.createClient('https://zuzvozgjsppkxvdlptmk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0');

        async function cargarDatos() {
            const grid = document.getElementById('dashboard');
            // Ordenamos por fecha de creación para que el número sea consecutivo
            const { data } = await sb.from('habitat').select('*').order('created_at', { ascending: true });
            
            grid.innerHTML = '';
            let contador = 1;

            data.forEach((row, index) => {
                const d = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
                const score = d?.["!irina"]?.evaluacion?.score_general;
                
                if (score) {
                    const card = document.createElement('div');
                    card.className = `blic-card`;
                    card.onclick = () => abrirModal(d);
                    
                    card.innerHTML = `
                        <div style="font-size:12px; font-weight:900;">BLIC #${contador.toString().padStart(3, '0')} | SCORE: ${score}</div>
                        <div class="radar-container"><canvas id="radar-${index}"></canvas></div>
                        <div class="icons-grid">${['🚀', '🛡️', '🧠', '🔗'].map(i => `<div class="icon-box">${i}</div>`).join('')}</div>
                    `;
                    grid.appendChild(card);
                    contador++; // Aumenta el número correlativo
                    
                    new Chart(document.getElementById(`radar-${index}`), {
                        type: 'radar',
                        data: { labels: ['Téc', 'Exp', 'Ada', 'Lid', 'IA'], datasets: [{ data: [4, 5, 3, 4, 5], backgroundColor: 'rgba(0,0,0,0.1)' }] },
                        options: { plugins: { legend: { display: false } }, scales: { r: { ticks: { display: false } } } }
                    });
                }
            });
        }
        
        cargarDatos();
    </script>
</body>
</html>
