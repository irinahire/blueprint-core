<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Blic - Irina Hire Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(to bottom left, #8EE4D5, #B588C0); min-height: 100vh; padding: 2rem; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .blic-card { 
            background: white; border-radius: 12px; padding: 12px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
            display: flex; flex-direction: column; gap: 5px; 
            aspect-ratio: 1 / 1.5; cursor: pointer; transition: all 0.3s ease;
        }
        /* Efecto Hover: Iluminación */
        .blic-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(255,255,255,0.4); }
        
        .bg-marron { background-color: #8B4513; color: white; }
        .bg-rojo { background-color: #e74c3c; color: white; }
        .bg-amarillo { background-color: #f1c40f; color: black; }
        .bg-verde { background-color: #2ecc71; color: white; }
        .bg-emerald-metal { background: radial-gradient(circle at 30% 30%, #50C878, #2E8B57); color: white; }
        .bg-irina-animado { background: linear-gradient(135deg, #8EE4D5, #B588C0, #8EE4D5, #B588C0); background-size: 400% 400%; animation: moveGradient 12s ease infinite; color: white; }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .title-score { font-size: 13px; font-weight: 900; display: flex; justify-content: space-between; }
        .radar-container { flex: 4; min-height: 0; display: flex; align-items: center; justify-content: center; }
        
        .icons-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 10px; margin-bottom: 8px; }
        .icon-box { background: rgba(0,0,0,0.05); aspect-ratio: 1/1; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        .btn-card { padding: 6px; border: none; border-radius: 6px; cursor: pointer; font-size: 8px; font-weight: bold; background: rgba(0,0,0,0.1); color: #333; }
    </style>
</head>
<body>

    <div class="grid-container" id="dashboard"></div>

    <script>
        const sb = supabase.createClient('https://zuzvozgjsppkxvdlptmk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0');

        async function cargarDatos() {
            const grid = document.getElementById('dashboard');
            const { data } = await sb.from('habitat').select('*');
            
            grid.innerHTML = '';
            const iconos = ['🚀', '🛡️', '🧠', '🔗'];

            data.forEach((row, index) => {
                const d = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
                const score = d?.["!irina"]?.evaluacion?.score_general;
                
                if (score) {
                    const card = document.createElement('div');
                    card.className = `blic-card ${getClase(score)}`;
                    // Click para abrir perfil completo
                    card.onclick = () => abrirPerfil(d);
                    
                    card.innerHTML = `
                        <div class="title-score"><span>BLIC #${row.id.slice(-5)}</span><span>SCORE: ${score}</span></div>
                        <div class="radar-container"><canvas id="radar-${index}"></canvas></div>
                        <div class="icons-grid">${iconos.map(i => `<div class="icon-box">${i}</div>`).join('')}</div>
                        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px; margin-top:2px;">
                            <button class="btn-card" onclick="event.stopPropagation(); window.open('${d?.["!documento"]?.url || '#'}')">CV</button>
                            <button class="btn-card">AUDIO</button>
                            <button class="btn-card">REPORT</button>
                        </div>
                    `;
                    grid.appendChild(card);
                    // (Logica Chart omitida por brevedad, igual a la anterior)
                }
            });
        }

        function abrirPerfil(data) {
            // Aquí puedes redirigir o abrir un Modal con la data completa
            console.log("Abriendo perfil completo...", data);
            alert("Redirigiendo al perfil de: " + data?.["!perfil"]?.["perfil-base"]?.nombre);
            // Aquí agregarás el enlace a WhatsApp con: 
            // https://wa.me/${data?.["!perfil"]?.["perfil-contacto"]?.telefono}
        }

        function getClase(s) {
            return s >= 98 ? 'bg-irina-animado' : s >= 90 ? 'bg-emerald-metal' : s >= 80 ? 'bg-verde' : s >= 60 ? 'bg-amarillo' : s >= 50 ? 'bg-rojo' : 'bg-marron';
        }

        cargarDatos();
    </script>
</body>
</html>
