<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Blic - Irina Hire Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(to bottom left, #8EE4D5, #B588C0); min-height: 100vh; padding: 2rem; }
        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; background: white; padding: 1rem 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid-container { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .blic-card { background: white; border-radius: 12px; padding: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 8px; aspect-ratio: 1 / 1.5; }
        
        .bg-marron { background-color: #8B4513; color: white; }
        .bg-rojo { background-color: #e74c3c; color: white; }
        .bg-amarillo { background-color: #f1c40f; color: black; }
        .bg-verde { background-color: #2ecc71; color: white; }
        .bg-emerald-metal { background: radial-gradient(circle at 30% 30%, #50C878, #2E8B57); color: white; box-shadow: inset 0 0 30px rgba(0,0,0,0.3); }
        .bg-irina-animado { background: linear-gradient(135deg, #8EE4D5, #B588C0, #8EE4D5, #B588C0); background-size: 400% 400%; animation: moveGradient 12s ease infinite; color: white; }
        @keyframes moveGradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .title-score { font-size: 14px; font-weight: 900; width: 100%; display: flex; justify-content: space-between; }
        .radar-container { flex: 1; min-height: 0; display: flex; align-items: center; justify-content: center; }
        .icons-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-top: 5px; padding: 0 10px; }
        .icon { background: rgba(0,0,0,0.1); aspect-ratio: 1 / 1; border-radius: 4px; }
        .btn-card { flex: 1; padding: 8px 2px; border: none; border-radius: 6px; cursor: pointer; font-size: 8px; font-weight: bold; background: #222; color: white; }
    </style>
</head>
<body>

    <div class="header-top">
        <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" style="max-width: 120px;">
        <h2>Dashboard Blic - Idoneidad (Agnóstico)</h2>
        <div style="width: 40px; height: 40px; border-radius: 50%; background: #ccc;"></div>
    </div>

    <div class="grid-container" id="dashboard"></div>

    <script>
        const sb = supabase.createClient(
            'https://zuzvozgjsppkxvdlptmk.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0'
        );

        async function initDashboard() {
            const grid = document.getElementById('dashboard');
            grid.innerHTML = ''; 

            // 1. Renderizar ejemplos estáticos SIEMPRE para visualizar el diseño
            const ejemplos = [
                { id: "00001", score: 99 }, { id: "00002", score: 95 }, 
                { id: "00003", score: 85 }, { id: "00004", score: 70 },
                { id: "00005", score: 55 }, { id: "00006", score: 30 }
            ];
            ejemplos.forEach((c, i) => createCard(c.id, c.score, null, i));

            // 2. Intentar cargar de la base
            console.log("Consultando tabla habitat...");
            const { data: registros, error } = await sb.from('habitat').select('*');
            
            if (error) {
                console.error("ERROR EN CONSULTA:", error);
            } else if (registros && registros.length > 0) {
                console.log("Registros reales hallados:", registros.length);
                registros.forEach((row, i) => {
                    const fractal = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
                    const score = fractal?.["!irina"]?.evaluacion?.score_general || 0;
                    if(score > 0) createCard(row.id.slice(-5).toUpperCase(), score, fractal, i + 100);
                });
            } else {
                console.warn("La tabla habitat existe pero no retornó registros.");
            }
        }

        function createCard(id, score, fractal, index) {
            let clase = (score >= 98) ? 'bg-irina-animado' : (score >= 90 ? 'bg-emerald-metal' : (score >= 80 ? 'bg-verde' : (score >= 60 ? 'bg-amarillo' : (score >= 50 ? 'bg-rojo' : 'bg-marron'))));
            const grid = document.getElementById('dashboard');
            const card = document.createElement('div');
            card.className = `blic-card ${clase}`;
            card.innerHTML = `
                <div class="title-score"><span>BLIC #${id}</span><span>SCORE: ${score}</span></div>
                <div class="radar-container"><canvas id="radar-${index}"></canvas></div>
                <div class="icons-grid">${Array(6).fill('<div class="icon"></div>').join('')}</div>
                <div style="display:flex; gap:5px; margin-top:15px;">
                    <button class="btn-card" onclick="window.open('${fractal?.["!documento"]?.url || '#'}')">CV</button>
                    <button class="btn-card">AUDIO</button>
                    <button class="btn-card">REPORT</button>
                </div>
            `;
            grid.appendChild(card);
            
            new Chart(document.getElementById(`radar-${index}`), {
                type: 'radar',
                data: { 
                    labels: ['Téc', 'Exp', 'Ada', 'Lid', 'IA'], 
                    datasets: [{ 
                        data: [4, 3, 5, 2, 4], 
                        backgroundColor: 'rgba(255,255,255,0.7)', 
                        borderColor: '#000000',
                        borderWidth: 2
                    }] 
                },
                options: { 
                    plugins: { legend: { display: false } }, 
                    scales: { r: { beginAtZero: true, max: 5, ticks: { display: false }, grid: { color: 'rgba(0,0,0,0.3)' } } } 
                }
            });
        }

        initDashboard();
    </script>
</body>
</html>
