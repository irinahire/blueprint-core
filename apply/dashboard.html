<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Blic - Irina Hire Selection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #f4f7f6; padding: 2rem; }
        h1 { margin-bottom: 2rem; color: #333; }

        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); 
            gap: 25px; 
        }

        /* Tarjeta Blic */
        .blic-card { 
            background: white; 
            border-radius: 20px; 
            padding: 25px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            position: relative; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Estados de fondo */
        .bg-default { background: #ffffff; }
        .bg-emerald-comic { background: radial-gradient(circle, #2ecc71 10%, #ffffff 10%) 0 0 / 20px 20px; }
        .bg-irina-gradient { 
            background: linear-gradient(135deg, #8EE4D5, #B588C0); 
            background-size: 200% 200%; 
            animation: rotate 5s linear infinite; 
        }
        @keyframes rotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .header-card { display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 22px; font-weight: bold; color: #222; }
        .score-box { background: rgba(255,255,255,0.9); padding: 6px 16px; border-radius: 12px; font-weight: bold; font-size: 14px; border: 1px solid #ddd; }
        
        .radar-placeholder { height: 220px; background: #f9f9f9; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #888; font-style: italic; }
        
        .icons-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .icon { background: #eee; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        .buttons-group { display: flex; gap: 10px; margin-top: 5px; }
        .btn-card { 
            flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; 
            font-size: 12px; font-weight: 600; background: #333; color: white; transition: background 0.3s;
        }
        .btn-card:hover { background: #555; }
    </style>
</head>
<body>

    <h1>Dashboard de Candidatos Blic</h1>
    <div class="grid-container" id="dashboard">
        <!-- Las tarjetas se generan aquí vía JS -->
    </div>

<script>
    async function cargarDashboard() {
        // Simulación de respuesta de Supabase
        // En producción: await fetch('URL_SUPABASE/rest/v1/perfil?order=score.desc', { headers: { ... } })
        const candidatos = [
            { id: 101, score: 99, cv_url: '#', audio_url: '#', reporte_url: '#' },
            { id: 102, score: 92, cv_url: '#', audio_url: '#', reporte_url: '#' },
            { id: 103, score: 75, cv_url: '#', audio_url: '#', reporte_url: '#' }
        ];
        
        const grid = document.getElementById('dashboard');
        
        candidatos.forEach(c => {
            const card = document.createElement('div');
            // Lógica de color según score
            let bgClass = 'bg-default';
            if (c.score >= 99) bgClass = 'bg-irina-gradient';
            else if (c.score >= 90) bgClass = 'bg-emerald-comic';
            
            card.className = `blic-card ${bgClass}`;
            
            card.innerHTML = `
                <div class="header-card">
                    <div class="title">Blic Sharp #${c.id}</div>
                    <div class="score-box">Score: ${c.score}%</div>
                </div>
                <div class="radar-placeholder">Gráfico Radar Big Five</div>
                <div class="icons-grid">
                    <div class="icon">★</div><div class="icon">★</div><div class="icon">★</div>
                    <div class="icon">★</div><div class="icon">★</div><div class="icon">★</div>
                </div>
                <div class="buttons-group">
                    <button class="btn-card" onclick="window.open('${c.cv_url}')">CV</button>
                    <button class="btn-card" onclick="window.open('${c.audio_url}')">Irina Audio</button>
                    <button class="btn-card" onclick="window.open('${c.reporte_url}')">Reporte</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    cargarDashboard();
</script>
</body>
</html>
