<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Blic - Irina Hire Selection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(to bottom left, #8EE4D5, #B588C0); 
            min-height: 100vh; 
            padding: 2rem; 
        }

        .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; background: white; padding: 1rem 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { max-width: 120px; }

        /* Grid para 4 tarjetas */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px; 
        }

        /* Tarjeta Blic Compacta */
        .blic-card { 
            background: white; 
            border-radius: 16px; 
            padding: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
        }

        .header-card { display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 16px; font-weight: bold; color: #333; }
        .score-box { background: #f0f0f0; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: bold; }
        
        .radar-placeholder { height: 150px; background: #f9f9f9; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #aaa; }
        
        .icons-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .icon { background: #eee; height: 30px; border-radius: 6px; }

        .buttons-group { display: flex; gap: 5px; }
        .btn-card { flex: 1; padding: 8px 4px; border: none; border-radius: 6px; cursor: pointer; font-size: 10px; font-weight: 600; background: #333; color: white; }

        /* Estados fondo */
        .bg-emerald-comic { background: radial-gradient(circle, #2ecc71 10%, #ffffff 10%) 0 0 / 15px 15px; }
        .bg-irina-gradient { background: linear-gradient(135deg, #8EE4D5, #B588C0); background-size: 200% 200%; animation: rotate 5s linear infinite; }
        @keyframes rotate { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    </style>
</head>
<body>

    <div class="header-top">
        <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" class="logo" alt="Irina">
        <h2 style="color: #555;">Dashboard de Proceso: Aplicaciones</h2>
        <div style="width: 50px; height: 50px; border-radius: 50%; background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') center/cover;"></div>
    </div>

    <div class="grid-container" id="dashboard">
        <!-- Las tarjetas se generan aquí -->
    </div>

<script>
    async function cargarDashboard() {
        const candidatos = [
            { id: 1, score: 99 }, { id: 2, score: 92 }, { id: 3, score: 75 }, { id: 4, score: 85 }
        ];
        
        const grid = document.getElementById('dashboard');
        
        candidatos.forEach(c => {
            const card = document.createElement('div');
            let bgClass = '';
            if (c.score >= 99) bgClass = 'bg-irina-gradient';
            else if (c.score >= 90) bgClass = 'bg-emerald-comic';
            
            card.className = `blic-card ${bgClass}`;
            card.innerHTML = `
                <div class="header-card">
                    <div class="title">Blic #${c.id}</div>
                    <div class="score-box">${c.score}%</div>
                </div>
                <div class="radar-placeholder">Telaraña Big Five</div>
                <div class="icons-grid">
                    ${Array(6).fill('<div class="icon"></div>').join('')}
                </div>
                <div class="buttons-group">
                    <button class="btn-card">CV</button>
                    <button class="btn-card">AUDIO</button>
                    <button class="btn-card">REPORT</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    cargarDashboard();
</script>
</body>
</html>
