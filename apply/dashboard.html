<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irina Hire Selection - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(45deg, #B588C0, #8EE4D5); min-height: 100vh; padding: 2rem; margin: 0; }
        .main-container { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 2rem; max-width: 1200px; margin: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 1rem; margin-bottom: 2rem; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .blic-card { border-radius: 12px; padding: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 8px; aspect-ratio: 1 / 1.5; cursor: pointer; transition: 0.3s; background: white; }
        .blic-card:hover { transform: translateY(-8px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .radar-container { flex: 4; min-height: 0; display: flex; align-items: center; justify-content: center; }
        #modal-perfil { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index:1000; padding: 30px; overflow-y: auto; }
        .modal-content { width: 90%; max-width: 1100px; margin: auto; background: white; padding: 50px; border-radius: 20px; position: relative; }
        .profile-layout { display: grid; grid-template-columns: 250px 1fr; gap: 40px; }
        .profile-photo { width: 100%; aspect-ratio: 1/1; background: #eee; border-radius: 15px; background-size: cover; background-position: center; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" style="max-width: 150px;">
        </div>
        <div class="grid-container" id="dashboard"></div>
    </div>
    <div id="modal-perfil" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="profile-layout">
                <div>
                    <div id="m-foto" class="profile-photo"></div>
                    <h2 id="m-nombre">Nombre</h2>
                    <p id="m-mail"></p>
                    <p id="m-telefono" style="font-weight:bold;"></p>
                </div>
                <div>
                    <h3>Trayectoria</h3>
                    <p id="m-trayectoria"></p>
                    <h3>Formación</h3>
                    <p id="m-estudios"></p>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div><h3>Blandas</h3><p id="m-blandas"></p></div>
                        <div><h3>Duras</h3><p id="m-duras"></p></div>
                    </div>
                </div>
            </div>
            <button onclick="document.getElementById('modal-perfil').style.display='none'" style="margin-top:20px; padding:10px 20px;">Cerrar</button>
        </div>
    </div>
    <script>
        const sb = supabase.createClient('https://zuzvozgjsppkxvdlptmk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0');
        async function cargarDatos() {
            const { data } = await sb.from('habitat').select('*');
            const grid = document.getElementById('dashboard');
            data.forEach((row, index) => {
                const d = typeof row.data === 'string' ? JSON.parse(row.data) : row.data;
                const card = document.createElement('div');
                card.className = "blic-card";
                card.onclick = () => abrirModal(d);
                card.innerHTML = `<div>Candidato ${index + 1}</div><div class="radar-container"><canvas id="radar-${index}"></canvas></div>`;
                grid.appendChild(card);
                new Chart(document.getElementById("radar-" + index), { type: 'radar', data: { labels: ['Téc', 'Exp', 'Ada', 'Lid', 'IA'], datasets: [{ data: [4, 5, 3, 4, 5], backgroundColor: 'rgba(0,0,0,0.1)' }] } });
            });
        }
        function abrirModal(d) {
            console.log("Datos:", d);
            const p = d["!perfil"] || {};
            const base = p["perfil-base"] || {};
            const cont = p["perfil-contacto"] || {};
            document.getElementById('m-nombre').innerText = base.nombre || "Sin nombre";
            document.getElementById('m-mail').innerText = cont.email || "Sin email";
            document.getElementById('m-telefono').innerText = cont.telefono || "Sin teléfono";
            document.getElementById('m-foto').style.backgroundImage = base.foto ? `url('${base.foto}')` : 'none';
            document.getElementById('m-trayectoria').innerText = p.trayectoria || "Sin info";
            document.getElementById('m-estudios').innerText = p.estudios || "Sin info";
            document.getElementById('m-blandas').innerText = p.habilidades_blandas || "Sin info";
            document.getElementById('m-duras').innerText = p.habilidades_duras || "Sin info";
            document.getElementById('modal-perfil').style.display = 'flex';
        }
        cargarDatos();
    </script>
</body>
</html>
