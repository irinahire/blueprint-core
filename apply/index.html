<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Portal de Postulación</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); --fucsia-solid: #bc8abf; --bg-dark: #05070a; }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; height: 85vh; display: flex; position: relative; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        .top-vincha { width: 100%; height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; box-sizing: border-box; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; text-transform: uppercase; color: white; }
        
        .main-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        .form-side { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; z-index: 1; }
        
        #success-message { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
        #success-message h2 { font-family: 'Montserrat', sans-serif; color: #bc8abf; font-size: 32px; }
        
        /* Efecto de luz para el botón (CORREGIDO) */
        .btn-wrapper { position: relative; padding: 3px; border-radius: 12px; margin-top: 10px; overflow: hidden; cursor: pointer; transition: all 0.3s ease; }
        
        /* Pseudo-elemento para la luz */
        .btn-wrapper::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, #bc8abf, #96e8da, transparent); animation: rotate 3s linear infinite; display: none; z-index: 0; }
        
        /* Activar luz al hover */
        .btn-wrapper:hover::before { display: block; }
        
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        #submit-btn { position: relative; width: calc(100% - 6px); /* Espacio para el borde */ height: 44px; /* Un poco más pequeño */ margin: 3px; background: var(--fucsia-solid); color: white; border: none; border-radius: 9px; font-weight: 800; cursor: pointer; z-index: 1; }

        .photo-side { width: 130px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 40px; padding-right: 20px; }
        .foto-preview-box { width: 120px; height: 120px; border: 2px dashed #bc8abf; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f9f9f9; cursor: pointer; margin-bottom: 8px; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 2px solid #f3f4f6; border-radius: 12px; }
        
        .visual-side { width: 35%; height: 100%; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; object-position: right; border-radius: 0 0 40px 0; display: block; }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div class="top-vincha">
                <div style="color:white; font-weight:900;">BLUE LAB</div>
                <div class="vincha-title">Irina Hire Selection</div>
            </div>

            <div id="content-wrapper" class="main-body">
                <form id="postulacion-form" style="display: flex; width: 100%;">
                    <div class="form-side">
                        <div class="input-group"><label>Nombre Completo</label><input type="text" id="nombre" required></div>
                        <div class="input-group"><label>Email</label><input type="email" id="email" required></div>
                        <div class="input-group"><label>WhatsApp</label><input type="tel" id="telefono" required></div>
                        <div class="input-group"><label>LinkedIn URL</label><input type="url" id="linkedin"></div>
                        <div class="input-group"><label>Adjuntar Currículum (PDF)</label><input type="file" id="cv" accept=".pdf" required></div>
                        
                        <div class="btn-wrapper">
                            <button type="submit" id="submit-btn">ENVIAR POSTULACIÓN</button>
                        </div>
                    </div>
                    
                    <div class="photo-side">
                        <label>Subir Foto</label>
                        <div class="foto-preview-box" onclick="document.getElementById('foto').click()">
                            <img id="preview-img-form" src="#" alt="Previsualización" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                            <span id="placeholder-text" style="color:#bc8abf; font-size: 24px;">+</span>
                        </div>
                        <input type="file" id="foto" accept="image/*" style="display:none" required>
                    </div>
                </form>

                <div id="success-message">
                    <div style="width: 150px; height: 150px; border-radius: 50%; overflow: hidden; border: 4px solid #bc8abf; margin-bottom: 20px;">
                        <img id="preview-img-success" src="#" alt="Previsualización final" style="width: 100%; height: 100%; object-fit: cover;">
                    </div>
                    <h2>¡Gracias por tu postulación, Walter!</h2>
                    <p style="color: #6b7280; font-size: 18px;">Estamos analizando tu perfil y tu currículum. Nos pondremos en contacto pronto.</p>
                </div>

                <div class="visual-side">
                    <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
                </div>
            </div>
        </div>
    </div>

    <script>
        const MY_SUPABASE_URL = 'https://zuzvozgjsppkxvdlptmk.supabase.co';
        const MY_SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0';
        
        const sb = supabase.createClient(MY_SUPABASE_URL, MY_SUPABASE_ANON_KEY);

        // Previsualización de imagen (CORREGIDA)
        document.getElementById('foto').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function() {
                // Obtenemos AMBAS imágenes (la del formulario y la de éxito)
                const imgForm = document.getElementById('preview-img-form');
                const imgSuccess = document.getElementById('preview-img-success');

                // Actualizamos AMBAS fuentes
                imgForm.src = reader.result;
                imgForm.style.display = 'block';
                imgSuccess.src = reader.result; // Esta es la clave para la pantalla final
                
                // Ocultamos el placeholder del formulario
                document.getElementById('placeholder-text').style.display = 'none';
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        // (Mismo proceso de subida que ya funciona)
        const subirArchivo = async (archivo, carpeta) => {
            const nombreArchivo = `${Date.now()}_${archivo.name}`;
            const { error: uploadError } = await sb.storage.from('curriculums').upload(`${carpeta}/${nombreArchivo}`, archivo);
            if (uploadError) throw uploadError;
            const { data: urlData } = sb.storage.from('curriculums').getPublicUrl(`${carpeta}/${nombreArchivo}`);
            return urlData.publicUrl;
        };

        document.getElementById('postulacion-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;
            
            try {
                // Obtenemos los archivos
                const fileFoto = document.getElementById('foto').files[0];
                const fileCv = document.getElementById('cv').files[0];

                // Subimos a Supabase
                const urlFoto = await subirArchivo(fileFoto, 'fotos');
                const urlCv = await subirArchivo(fileCv, 'cvs');

                // Insertamos en la base de datos
                await sb.from('blueprint_ecosystem').insert([{ 
                    unique_id: "postulante_" + Date.now(), 
                    dna_content: {
                        nombre: document.getElementById('nombre').value,
                        email: document.getElementById('email').value,
                        telefono: document.getElementById('telefono').value,
                        linkedin: document.getElementById('linkedin').value,
                        urlFoto: urlFoto,
                        urlCv: urlCv
                    }
                }]);

                // Cambiar el contenido de la pantalla (ya confirmado que funciona)
                document.getElementById('postulacion-form').style.display = 'none';
                document.getElementById('success-message').style.display = 'flex';
                
            } catch (err) {
                console.error("Error completo:", err);
                alert("Error al enviar: " + err.message);
                btn.innerText = "ENVIAR POSTULACIÓN";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
