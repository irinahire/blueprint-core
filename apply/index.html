<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Portal de Postulación</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); --fucsia-solid: #bc8abf; --bg-dark: #05070a; }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; height: 85vh; display: flex; position: relative; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        .top-vincha { width: 100%; height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; box-sizing: border-box; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; text-transform: uppercase; color: white; }
        
        /* Contenedor principal con display flex */
        .main-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* Columna de formularios */
        .form-side { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; z-index: 1; }
        
        /* Bloque de foto ajustado */
        .photo-side { width: 130px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-right: 20px; }
        .foto-preview-box { width: 120px; height: 120px; border: 2px dashed #bc8abf; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f9f9f9; cursor: pointer; margin-bottom: 8px; }
        
        label { display: block; font-size: 11px; font-weight: 800; color: #6b7280; text-transform: uppercase; margin-bottom: 6px; }
        .input-group { margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 2px solid #f3f4f6; border-radius: 12px; }
        #submit-btn { width: 100%; height: 50px; background: var(--fucsia-solid); color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; margin-top: 10px; }
        
        /* La imagen de Irina ahora ocupa todo el alto y está pegada a la derecha */
        .visual-side { width: 35%; height: 100%; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; object-position: right; border-radius: 0 0 40px 0; display: block; }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div class="top-vincha">
                <div style="color:white; font-weight:900;">BLUE LAB</div>
                <div class="vincha-title">Irina Hire Selection</div>
            </div>
            <form id="postulacion-form" class="main-body">
                <div class="form-side">
                    <div class="input-group"><label>Nombre Completo</label><input type="text" id="nombre" required></div>
                    <div class="input-group"><label>Email</label><input type="email" id="email" required></div>
                    <div class="input-group"><label>WhatsApp</label><input type="tel" id="telefono" required></div>
                    <div class="input-group"><label>LinkedIn URL</label><input type="url" id="linkedin"></div>
                    <div class="input-group"><label>Adjuntar Currículum (PDF)</label><input type="file" id="cv" accept=".pdf" required></div>
                    <button type="submit" id="submit-btn">ENVIAR Y PREPARAR ENTREVISTA</button>
                </div>
                
                <div class="photo-side">
                    <label>Subir Foto</label>
                    <div class="foto-preview-box" onclick="document.getElementById('foto').click()">
                        <img id="preview-img" src="#" alt="Previsualización" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                        <span id="placeholder-text" style="color:#bc8abf; font-size: 24px;">+</span>
                    </div>
                    <input type="file" id="foto" accept="image/*" style="display:none" required>
                </div>

                <div class="visual-side">
                    <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
                </div>
            </form>
        </div>
    </div>
    
    </body>
</html>
