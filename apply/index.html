<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply | Blue Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%);
            --bg-dark: #05070a;
            --text-dark: #111827;
        }
        body { margin: 0; padding: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; height: 85vh; display: flex; position: relative; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        .top-vincha { width: 100%; height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; box-sizing: border-box; }
        .brand-left { display: flex; flex-direction: column; color: white; line-height: 1.1; font-family: 'Montserrat', sans-serif; }
        .blue-lab-text { font-weight: 900; font-size: 26px; letter-spacing: -1px; }
        .blueprint-subtext { font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.95; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; text-transform: uppercase; color: white; }
        .form-content { flex: 1; width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div class="top-vincha">
                <div class="brand-left">
                    <span class="blue-lab-text">BLUE LAB</span>
                    <span class="blueprint-subtext">Blueprint Integrations Lab</span>
                </div>
                <div class="vincha-title">Postulaciones</div>
            </div>
            <iframe class="form-content" src="https://tally.so/r/Me8VEA"></iframe>
        </div>
    </div>
</body>
</html>
