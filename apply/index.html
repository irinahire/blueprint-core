<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Portal de Postulación</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --fucsia: #bc8abf; 
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); 
            --btn-gradient: linear-gradient(to right, #96e8da 0%, #bc8abf 100%);
            --bg-dark: #05070a; 
        }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; height: 85vh; display: flex; position: relative; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        .top-vincha { width: 100%; height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; box-sizing: border-box; flex-shrink: 0; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; text-transform: uppercase; color: white; }
        
        .main-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        .form-side { flex: 1; padding: 40px; display: flex; flex-direction: column; overflow-y: auto; z-index: 1; }
        
        /* Animación Campos */
        .input-group { position: relative; margin-top: 25px; }
        .input-group label { position: absolute; left: 12px; top: 14px; color: var(--fucsia); font-weight: 700; transition: 0.2s; pointer-events: none; background: white; padding: 0 4px; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid #f3f4f6; border-radius: 12px; outline: none; box-sizing: border-box; }
        .input-group input:focus { border-color: var(--fucsia); }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top: -10px; font-size: 11px; color: var(--fucsia); }

        /* Botón con animación circular */
        .btn-wrapper { position: relative; padding: 3px; border-radius: 12px; margin-top: 25px; overflow: hidden; cursor: pointer; }
        .btn-wrapper::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--fucsia), #96e8da, transparent); animation: rotate 3s linear infinite; display: none; }
        .btn-wrapper:hover::before { display: block; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        #submit-btn { position: relative; width: 100%; height: 50px; background: var(--btn-gradient); color: white; border: none; border-radius: 9px; font-weight: 800; cursor: pointer; z-index: 1; }

        input[type="file"]::file-selector-button { background: var(--fucsia); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 10px; }
        
        .photo-side { width: 130px; display: flex; flex-direction: column; align-items: center; padding-top: 40px; padding-right: 20px; }
        .foto-title { font-size: 11px; font-weight: 800; color: var(--fucsia); text-transform: uppercase; margin-bottom: 6px; display: block; }
        .foto-preview-box { width: 120px; height: 120px; border: 2px dashed var(--fucsia); border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f9f9f9; cursor: pointer; }
        
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 15%); }
        #success-screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div class="top-vincha">
                <div style="color:white; font-weight:900;">BLUE LAB</div>
                <div class="vincha-title">Irina Hire Selection</div>
            </div>

            <div id="content-wrapper" class="main-body">
                <form id="postulacion-form" style="display: flex; width: 100%;">
                    <input type="hidden" id="oferta_vinculada" name="oferta_vinculada">
                    <div class="form-side">
                        <div class="input-group"><input type="text" id="nombre" placeholder=" " required><label>Nombre Completo</label></div>
                        <div class="input-group"><input type="email" id="email" placeholder=" " required><label>Email</label></div>
                        <div class="input-group"><input type="tel" id="telefono" placeholder=" " required><label>WhatsApp</label></div>
                        <div class="input-group"><input type="url" id="linkedin" placeholder=" "><label>LinkedIn URL</label></div>
                        <div class="input-group" style="margin-top:25px;">
                            <label style="position:static; margin-bottom:8px;">ADJUNTAR CURRÍCULUM (PDF)</label>
                            <input type="file" id="cv" accept=".pdf" required style="border: 1px solid #ddd; padding: 5px;">
                        </div>
                        <div class="btn-wrapper">
                            <button type="submit" id="submit-btn">ENVIAR POSTULACIÓN</button>
                        </div>
                    </div>
                    
                    <div class="photo-side">
                        <span class="foto-title">SUBIR FOTO</span>
                        <div class="foto-preview-box" onclick="document.getElementById('foto').click()">
                            <img id="preview-img-form" src="#" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                            <span id="placeholder-text" style="color:#bc8abf; font-size: 24px;">+</span>
                        </div>
                        <input type="file" id="foto" accept="image/*" style="display:none" required>
                    </div>
                </form>

                <div id="success-screen">
                    <h1 style="color:var(--fucsia);">¡Postulación Enviada!</h1>
                </div>

                <div class="visual-side" style="width: 35%; height: 100%; position: relative;">
                    <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
                </div>
            </div>
        </div>
    </div>
