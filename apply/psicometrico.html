<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gimnasio de Habilidades - Irina Hire Selection</title>
    <style>
        /* Reset de estilos básicos */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Fondo degradé diagonal: turquesa a fucsia/lila */
            background: linear-gradient(to bottom left, #8EE4D5, #B588C0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Contenedor blanco principal (La tarjeta) */
        .main-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 1200px;
            height: 85vh; /* Altura dinámica para que parezca una aplicación */
            min-height: 600px;
            display: flex;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            overflow: hidden; /* Evita que la imagen de la derecha sobresalga de los bordes redondeados */
        }

        /* Columna izquierda (Espacio en blanco para logo y tests) */
        .left-column {
            flex: 1; /* Ocupa el espacio restante, aprox 60% */
            padding: 3rem 4rem;
            display: flex;
            flex-direction: column;
        }

        .logo-container {
            margin-bottom: 2rem;
        }

        .logo {
            max-width: 280px;
            height: auto;
        }

        /* Área dedicada a inyectar los tests psicométricos */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            /* El espacio se deja libre a propósito para insertar el HTML futuro */
        }

        /* Columna derecha (Imagen de Irina) */
        .right-column {
            width: 40%; /* Ocupa el 40% del ancho del contenedor */
            background-image: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
        }

        /* Diseño Responsivo (Para tablets y celulares) */
        @media (max-width: 900px) {
            body {
                padding: 1rem;
            }
            .main-container {
                flex-direction: column;
                height: auto;
            }
            .left-column {
                padding: 2rem;
            }
            .right-column {
                width: 100%;
                height: 400px; /* Altura fija para que Irina se vea en móviles */
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <!-- MITAD IZQUIERDA -->
        <div class="left-column">
            <!-- Logo de Irina -->
            <div class="logo-container">
                <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" alt="Irina Hire Selection" class="logo">
            </div>
            
            <!-- Contenedor vacío donde irán la barra de progreso y las tarjetas de los tests -->
            <div class="content-area" id="psychometric-tests-container">
                <!-- Aquí inyectaremos el contenido en el próximo paso -->
            </div>
        </div>

        <!-- MITAD DERECHA (Imagen) -->
        <div class="right-column">
            <!-- La imagen está configurada en el CSS como fondo para que siempre cubra el espacio perfecto -->
        </div>

    </div>

</body>
</html>
