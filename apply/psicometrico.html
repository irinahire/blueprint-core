<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación Psicométrica - Irina Hire Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --pink-irina: #bc8abf; --mint-irina: #96e8da; --bg-dark: #05070a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; color: white; }
        
        .main-container { background: rgba(255,255,255,0.05); width: 100%; max-width: 1200px; height: 85vh; display: flex; border-radius: 30px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        .left-column { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: rgba(0,0,0,0.4); }
        .header-wrapper { padding: 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* Modal Estilo BlueLab */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 20px; width: 350px; text-align: center; border: 1px solid var(--mint-irina); }
        .google-btn { background: white; color: #333; padding: 12px; width: 100%; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; margin-top: 20px; }
        
        .scroll-area { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        .options-grid { width: 450px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .right-column { width: 30%; background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') center/cover no-repeat; }
    </style>
</head>
<body>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2 style="color: var(--mint-irina);">Acceso al Proceso</h2>
        <p style="font-size: 0.9rem; color: #ccc; margin-top: 15px;">Para avanzar y que Irina procese tu trayectoria, por favor inicia sesión con Google.</p>
        <button class="google-btn" onclick="ingresarConGoogle()">CONTINUAR CON GOOGLE</button>
    </div>
</div>

<div class="main-container">
    <div class="left-column">
        <div class="header-wrapper">
            <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" style="max-width: 120px;">
            <button id="btn-login" onclick="document.getElementById('loginModal').style.display='flex'" style="padding: 10px 20px; background: var(--pink-irina); color: white; border: none; border-radius: 10px; cursor: pointer;">Acceder</button>
        </div>
        <div class="scroll-area">
            <div id="options-grid" class="options-grid"></div>
        </div>
    </div>
    <div class="right-column"></div>
</div>

<script>
    const sbClient = supabase.createClient(
        'https://zuzvozgjsppkxvdlptmk.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0'
    );

    // Al cargar: revisar sesión
    window.onload = async () => {
        const { data: { session } } = await sbClient.auth.getSession();
        if (!session) {
            document.getElementById('loginModal').style.display = 'flex';
        } else {
            handleSession(session);
        }
    };

    window.ingresarConGoogle = async () => {
        await sbClient.auth.signInWithOAuth({ 
            provider: 'google',
            options: { redirectTo: window.location.href } // Vuelve a esta misma página
        });
    };

    function handleSession(session) {
        localStorage.setItem('applicantId', session.user.id);
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('btn-login').innerText = "Usuario Conectado";
        document.getElementById('btn-login').style.background = "var(--mint-irina)";
    }
</script>
<script src="motor-tests.js"></script>
</body>
</html>
