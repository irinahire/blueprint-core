<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proceso de Aplicación - Irina Hire Selection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom left, #8EE4D5, #B588C0); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .main-container { background: #fff; width: 100%; max-width: 1200px; height: 85vh; display: flex; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .left-column { flex: 1; padding: 1.5rem 3rem 2rem 1.5rem; display: flex; flex-direction: column; overflow: hidden; }
        .header-container { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
        .logo { max-width: 140px; }
        
        /* Stepper */
        .stepper-container { display: flex; align-items: center; }
        .step { display: flex; flex-direction: column; align-items: center; width: 90px; }
        .step-circle { width: 40px; height: 40px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #777; }
        .step.completed .step-circle { background: #8EE4D5; color: #fff; }
        .step.active .step-circle { background: #B588C0; color: #fff; box-shadow: 0 0 10px rgba(181, 136, 192, 0.5); }
        .step-label { font-size: 11px; margin-top: 5px; color: #555; font-weight: 600; }
        .step-line { flex: 1; height: 4px; background: #e0e0e0; margin-bottom: 20px; }
        
        /* Estilos Test Visual */
        .content-area { flex: 1; overflow-y: auto; }
        .matriz-container { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; margin: 20px 0; }
        .celda { width: 100px; height: 100px; background: #0077aa; border-radius: 4px; }
        .opciones-container { display: flex; gap: 15px; margin-top: 20px; }
        .opcion-btn { width: 60px; height: 60px; border: 2px solid #B588C0; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .opcion-btn:hover { background: #f0f0f0; }

        .right-column { width: 30%; background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') center/cover no-repeat; display: flex; flex-direction: column; align-items: center; padding-top: 2rem; }
        button { padding: 1rem 2rem; background: #B588C0; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-column">
        <div class="header-container">
            <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" class="logo">
            <div class="stepper-container">
                <div class="step completed"><div class="step-circle">✓</div><div class="step-label">Postulación</div></div>
                <div class="step-line completed"></div>
                <div class="step completed"><div class="step-circle">✓</div><div class="step-label">Análisis</div></div>
                <div class="step-line completed"></div>
                <div class="step active"><div class="step-circle">3</div><div class="step-label">Psicométrico</div></div>
                <div class="step-line"></div>
                <div class="step"><div class="step-circle">4</div><div class="step-label">Entrevista</div></div>
            </div>
            <button id="btn-login" style="margin:0;">Login Google</button>
        </div>

        <div id="psychometric-tests-container" class="content-area">
            <div id="pantalla-logica">
                <h3>Escenario 1: Razonamiento Abstracto</h3>
                <div class="matriz-container">
                    <div class="celda"></div><div class="celda"></div><div class="celda"></div>
                    <div class="celda"></div><div class="celda"></div><div class="celda"></div>
                    <div class="celda"></div><div class="celda"></div><div style="background:#8EE4D5; display:flex; align-items:center; justify-content:center; font-size:2rem; color:white;">?</div>
                </div>
                <p>Selecciona la figura que completa la secuencia:</p>
                <div class="opciones-container">
                    <div class="opcion-btn" onclick="seleccionar(this)">A</div>
                    <div class="opcion-btn" onclick="seleccionar(this)">C</div>
                    <div class="opcion-btn" onclick="seleccionar(this)">D</div>
                    <div class="opcion-btn" onclick="seleccionar(this)">E</div>
                    <div class="opcion-btn" onclick="seleccionar(this)">F</div>
                </div>
                <button onclick="next('logica', 'situacional')">Siguiente Escenario</button>
            </div>

            </div>
    </div>
    <div class="right-column">
        <h3 style="color:white; text-align:center;">Irina Hire Selection</h3>
    </div>
</div>

<script>
    function seleccionar(el) {
        document.querySelectorAll('.opcion-btn').forEach(btn => btn.style.background = 'white');
        el.style.background = '#8EE4D5';
    }

    function next(actual, proxima) {
        // Lógica de transición de pantallas
        console.log("Guardando datos de:", actual);
    }
</script>
</body>
</html>
