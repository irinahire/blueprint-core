<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación Psicométrica - Irina Hire Selection</title>
    <link href="https://unpkg.com/survey-core/defaultV2.min.css" type="text/css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom left, #8EE4D5, #B588C0); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .main-container { background: #fff; width: 100%; max-width: 1200px; height: 85vh; display: flex; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .left-column { flex: 1; padding: 2rem; display: flex; flex-direction: column; overflow-y: auto; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .stepper-container { display: flex; align-items: center; gap: 20px; }
        .step { display: flex; flex-direction: column; align-items: center; width: 80px; }
        .step-circle { width: 35px; height: 35px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #777; }
        .step.active .step-circle { background: #B588C0; color: #fff; }
        .step-label { font-size: 10px; margin-top: 5px; color: #555; text-transform: uppercase; font-weight: 700; }
        .right-column { width: 30%; background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') center/cover no-repeat; }
        #surveyElement { width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-column">
        <div class="header-container">
            <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" style="max-width: 120px;">
            <div class="stepper-container">
                <div class="step"><div class="step-circle">1</div><div class="step-label">Postulación</div></div>
                <div class="step"><div class="step-circle">2</div><div class="step-label">Análisis</div></div>
                <div class="step active"><div class="step-circle">3</div><div class="step-label">Psicométrico</div></div>
            </div>
            <button style="padding: 10px 20px; background: #B588C0; color: white; border: none; border-radius: 5px;">Login Google</button>
        </div>

        <div id="surveyElement"></div>
    </div>
    <div class="right-column"></div>
</div>

<script src="https://unpkg.com/survey-jquery/survey.jquery.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    const surveyJson = {
        elements: [
            { type: "html", html: "<h3>Razonamiento Abstracto</h3>" },
            { type: "radiogroup", name: "pregunta1", title: "Seleccione una opción:", choices: [1, 2, 3, 4, 5, 6, 7, 8], colCount: 4 }
        ]
    };

    $(document).ready(function() {
        var survey = new Survey.Model(surveyJson);
        $("#surveyElement").Survey({ model: survey });
        
        survey.onComplete.add(function(sender) {
            console.log("Resultado:", sender.data);
            alert("Respuesta guardada: " + JSON.stringify(sender.data));
        });
    });
</script>

</body>
</html>
