<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Psicométrica | Irina Hire Selection</title>
    <link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --pink-irina: #bc8abf; --mint-irina: #96e8da; --bg-dark: #05070a;
            --blue-qore: #4e52a7; --blue-next: #85c1e9;
        }
        body { margin: 0; padding: 0; background-color: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; justify-content: center; min-height: 100vh; color: white; }
        
        .report-frame { width: 95%; max-width: 1300px; margin: 40px 0; padding: 1px; border-radius: 30px; background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent); }
        .report-content { background: linear-gradient(rgba(10, 14, 23, 0.7), rgba(10, 14, 23, 0.7)), url('https://i.ibb.co/1tx0dKMJ/fondoweb.jpg'); background-size: cover; border-radius: 29px; min-height: 80vh; display: flex; flex-direction: column; }
        
        header { padding: 40px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .brand h1 { font-family: 'Alkatra', cursive; font-size: 3rem; margin: 0; background: linear-gradient(to right, #fff, var(--mint-irina)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand span { font-size: 0.9rem; letter-spacing: 4px; text-transform: uppercase; color: #85c1e9; display: block; }

        .auth-btn { background: linear-gradient(135deg, var(--blue-qore), var(--blue-next)); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(133, 193, 233, 0.5); }

        .user-profile { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.1); padding: 8px 20px 8px 8px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--mint-irina); object-fit: cover; }
        .user-name { font-size: 0.9rem; font-weight: 600; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 40px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid var(--mint-irina); }
        .google-btn { background: white; color: #555; padding: 12px; width: 100%; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
        
        .content-area { padding: 60px; text-align: center; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Acceso al Proceso</h2>
            <p style="color:#888; margin: 10px 0;">Ingresá con Google para continuar.</p>
            <button class="google-btn" onclick="ingresarConGoogle()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20">
                INGRESAR CON GOOGLE
            </button>
        </div>
    </div>

    <div class="report-frame">
        <div class="report-content">
            <header>
                <div class="brand"><h1>Irina Hire</h1><span>Psicométricos</span></div>
                <div id="auth-zone" class="auth-zone">
                    <button class="auth-btn" id="loginBtn" onclick="document.getElementById('loginModal').style.display='flex'">ACCEDER</button>
                    <div id="userZone" style="display:none;" class="user-profile">
                        <img id="userAvatar" class="user-avatar" src="">
                        <span id="userName" class="user-name"></span>
                        <button class="auth-btn" style="padding: 8px 15px; font-size: 0.7rem; background: #333;" onclick="cerrarSesion()">SALIR</button>
                    </div>
                </div>
            </header>
            <div class="content-area">
                <div id="options-grid"></div>
            </div>
        </div>
    </div>

    <script>
        const sbClient = supabase.createClient(
            'https://zuzvozgjsppkxvdlptmk.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0'
        );

        window.ingresarConGoogle = async () => {
            await sbClient.auth.signInWithOAuth({ 
                provider: 'google', 
                options: { redirectTo: window.location.href } 
            });
        };

        window.cerrarSesion = async () => { 
            await sbClient.auth.signOut(); 
            location.reload(); 
        };

        const updateUI = (session) => {
            if (session) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userZone').style.display = 'flex';
                document.getElementById('userName').innerText = session.user.user_metadata.full_name || 'Usuario';
                document.getElementById('userAvatar').src = session.user.user_metadata.avatar_url || '';
                document.getElementById('loginModal').style.display = 'none';
            }
        };

        window.onload = async () => {
            const { data: { session } } = await sbClient.auth.getSession();
            updateUI(session);
        };

        sbClient.auth.onAuthStateChange((event, session) => {
            updateUI(session);
        });
    </script>
    <script src="motor-tests.js"></script>
</body>
</html>
