<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación Psicométrica - Irina Hire Selection</title>
    <link href="https://unpkg.com/survey-core/defaultV2.min.css" type="text/css" rel="stylesheet">
</head>
<body>

<div id="surveyElement"></div>

<script src="https://unpkg.com/survey-core/survey.core.min.js"></script>
<script src="https://unpkg.com/survey-knockout-ui/survey-knockout-ui.min.js"></script>

<script>
    const surveyJson = {
        pages: [{
            elements: [
                {
                    type: "html",
                    html: "<h3>Seleccione su respuesta:</h3>"
                },
                {
                    type: "radiogroup",
                    name: "pregunta1",
                    choices: [1, 2, 3, 4, 5, 6, 7, 8],
                    colCount: 4
                }
            ]
        }]
    };

    // Inicialización correcta para evitar el error de textContent
    const survey = new Survey.Model(surveyJson);
    
    survey.onComplete.add((sender) => {
        console.log("Resultados:", sender.data);
        alert("Enviado: " + JSON.stringify(sender.data));
    });

    document.addEventListener("DOMContentLoaded", function() {
        // En lugar de pasar el ID como string, pasamos el elemento del DOM
        const element = document.getElementById("surveyElement");
        survey.mount(element);
    });
</script>

</body>
</html>
