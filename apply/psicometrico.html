<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Psicométrica - Irina Hire Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --fucsia: #bc8abf; 
            --turquesa: #96e8da;
            --irina-gradient: linear-gradient(to right, var(--fucsia) 0%, var(--turquesa) 100%); 
            --bg-dark: #05070a; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-dark); padding: 20px 2rem; min-height: 100vh; }
        
        /* MARCO ESTÁNDAR */
        .outer-frame { padding: 8px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1200px; margin: 0 auto; min-height: 85vh; }
        .app-container { background: #f9f7f2; width: 100%; min-height: calc(85vh - 16px); border-radius: 42px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .header-wrapper { padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: white; }
        
        /* STEPPER */
        .stepper-container { display: flex; align-items: center; gap: 30px; }
        .step { display: flex; flex-direction: column; align-items: center; width: 80px; }
        .step-circle { width: 35px; height: 35px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #777; }
        .step.completed .step-circle { background: #8EE4D5; color: #fff; }
        .step.active .step-circle { background: #B588C0; color: #fff; }
        .step-label { font-size: 10px; margin-top: 5px; color: #555; text-transform: uppercase; font-weight: 700; text-align: center; }

        /* AREA DE CONTENIDO (donde el script inyecta los elementos) */
        .scroll-area { flex: 1; padding: 3rem; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* AUTH UI */
        .auth-btn { background: linear-gradient(135deg, #4e52a7, #85c1e9); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .user-profile { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.05); padding: 5px 20px 5px 10px; border-radius: 50px; border: 1px solid #ddd; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
        
        /* MODAL */
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .google-btn { background: #4285f4; color: white; padding: 12px; width: 100%; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-container">
        <header class="header-wrapper">
            <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" style="max-width: 120px;">
            
            <div class="stepper-container">
                <div class="step completed"><div class="step-circle">✓</div><div class="step-label">Postulación</div></div>
                <div class="step completed"><div class="step-circle">✓</div><div class="step-label">Análisis</div></div>
                <div class="step active"><div class="step-circle">3</div><div class="step-label">Psicométrico</div></div>
                <div class="step"><div class="step-circle">4</div><div class="step-label">Entrevista</div></div>
            </div>

            <button class="auth-btn" id="loginBtn" onclick="document.getElementById('loginModal').style.display='flex'">ACCEDER AL PORTAL</button>
            <div id="userZone" style="display:none;" class="user-profile">
                <img id="userAvatar" class="user-avatar" src="">
                <span id="userName" class="user-name"></span>
                <button class="auth-btn" style="padding: 8px 15px; background: #333;" onclick="cerrarSesion()">SALIR</button>
            </div>
        </header>

        <div id="options-grid" class="scroll-area"></div>
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>BlueLab Acceso</h2>
        <button class="google-btn" onclick="ingresarConGoogle()">INGRESAR CON GOOGLE</button>
    </div>
</div>

<script>
    // Inicialización Supabase
    window.sbClient = supabase.createClient('https://zuzvozgjsppkxvdlptmk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0');

    window.ingresarConGoogle = async () => {
        document.getElementById('loginModal').style.display = 'none';
        await window.sbClient.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } });
    };

    window.cerrarSesion = async () => { await window.sbClient.auth.signOut(); location.reload(); };

    window.sbClient.auth.onAuthStateChange((event, session) => {
        const loginBtn = document.getElementById('loginBtn');
        const userZone = document.getElementById('userZone');
        if (session) {
            loginBtn.style.display = 'none';
            userZone.style.display = 'flex';
            document.getElementById('userName').innerText = session.user.user_metadata.full_name || 'Usuario';
            document.getElementById('userAvatar').src = session.user.user_metadata.avatar_url || '';
        }
    });

    window.onload = async () => {
        const { data: { session } } = await window.sbClient.auth.getSession();
        if (session) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('userZone').style.display = 'flex';
            document.getElementById('userName').innerText = session.user.user_metadata.full_name || 'Usuario';
            document.getElementById('userAvatar').src = session.user.user_metadata.avatar_url || '';
        }
    };
</script>
<script src="motor-tests.js"></script>
</body>
</html>
