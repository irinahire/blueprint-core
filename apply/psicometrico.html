<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación Psicométrica - Irina Hire Selection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom left, #8EE4D5, #B588C0); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .main-container { background: #fff; width: 100%; max-width: 1200px; height: 85vh; display: flex; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .left-column { flex: 1; padding: 2rem; display: flex; flex-direction: column; overflow-y: auto; }
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .content-area { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .main-test-image { width: 400px; border: 1px solid #eee; }
        .options-grid { width: 450px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .option-box { border: 2px solid #ddd; border-radius: 8px; height: 80px; cursor: pointer; transition: 0.2s; background: #f9f9f9; display: flex; align-items: center; justify-content: center; }
        .option-box:hover { border: 2px solid #B588C0; }
        .option-box img { max-width: 90%; height: auto; pointer-events: none; }
        .right-column { width: 30%; background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') center/cover no-repeat; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-column">
        <div class="header-container">
            <img src="https://i.ibb.co/JFMJBm0S/logo-ihs.jpg" style="max-width: 120px;">
            <button id="btn-login" style="padding: 10px 20px; background: #B588C0; color: white; border: none; border-radius: 5px; cursor: pointer;">Login con Google</button>
        </div>

        <div class="content-area">
            <img src="https://www.bluelab.online/apply/img/test_a1.png" class="main-test-image">
            <div id="options-grid" class="options-grid"></div>
        </div>
    </div>
    <div class="right-column"></div>
</div>

<script>
    // 1. CONFIGURACIÓN SUPABASE (Reemplazá con tus credenciales)
    const supabase = supabase.createClient('TU_SUPABASE_URL', 'TU_SUPABASE_ANON_KEY');

    // 2. LÓGICA LOGIN GOOGLE
    document.getElementById('btn-login').onclick = async () => {
        const { data, error } = await supabase.auth.signInWithOAuth({
            provider: 'google'
        });
        if (error) alert("Error: " + error.message);
    };

    // 3. GENERADOR DE IMÁGENES AUTOMÁTICO
    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('options-grid');
        const baseUrl = "https://www.bluelab.online/apply/img/";

        for (let i = 1; i <= 8; i++) {
            const div = document.createElement('div');
            div.className = 'option-box';
            
            const img = document.createElement('img');
            img.src = `${baseUrl}test_a1_r${i}.png`;
            
            div.appendChild(img);
            
            div.onclick = async () => {
                // Validación: ¿Está logueado el usuario?
                const { data: { user } } = await supabase.auth.getUser();
                if (!user) {
                    alert("Debes iniciar sesión con Google para guardar tu respuesta.");
                    return;
                }
                
                // Guardado en Supabase
                const { error } = await supabase.from('respuestas_psicometrico').insert({
                    user_id: user.id,
                    pregunta: 'test_a1',
                    respuesta: i
                });
                
                alert(error ? "Error: " + error.message : "¡Respuesta guardada!");
            };
            grid.appendChild(div);
        }
    });
</script>

</body>
</html>
