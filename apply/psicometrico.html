<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Psicométrica - Irina Hire Selection</title>
    
    <!-- Carga de la librería base -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Carga del módulo que gestiona la sesión y la cabecera -->
    <script src="../auth-module.js"></script>
    
    <style>
        :root { 
            --fucsia: #bc8abf; 
            --turquesa: #96e8da;
            --irina-gradient: linear-gradient(to right, var(--fucsia) 0%, var(--turquesa) 100%); 
            --bg-dark: #05070a; 
            --bg-body: #f9f7f2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-dark); 
            padding: 20px 2rem; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .outer-frame { 
            padding: 8px; 
            background: var(--irina-gradient); 
            border-radius: 50px; 
            width: 95%; 
            max-width: 1350px; 
            margin: 0 auto; 
            min-height: 94vh; 
        }

        .app-container { 
            background: var(--bg-body); 
            width: 100%; 
            min-height: calc(94vh - 16px); 
            border-radius: 42px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* CABECERA (Asegúrate que el script busque este ID) */
        #header-placeholder { 
            width: 100%; 
            background: white; 
            min-height: 80px; 
            border-bottom: 1px solid #eee;
        }

        /* STEPPER */
        .stepper-row { display: flex; justify-content: center; padding: 25px 20px; background: white; border-bottom: 1px solid #eee; }
        .stepper-container { display: flex; align-items: center; gap: 40px; }
        .step { display: flex; flex-direction: column; align-items: center; width: 80px; }
        .step-circle { width: 35px; height: 35px; border-radius: 50%; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #777; font-size: 14px; }
        .step.completed .step-circle { background: #8EE4D5; color: #fff; }
        .step.active .step-circle { background: #B588C0; color: #fff; }
        .step-label { font-size: 10px; margin-top: 8px; color: #555; text-transform: uppercase; font-weight: 700; text-align: center; }

        /* INTERACTIVIDAD Y CURSORES */
        /* Aplicamos puntero a las imágenes de respuesta */
        #options-grid img, #options-grid div[onclick] { cursor: pointer !important; transition: transform 0.2s ease; }
        #options-grid img:hover { transform: scale(1.05); }

        /* Animación para botones */
        button { transition: all 0.3s ease; }
        button:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); cursor: pointer; }

        .scroll-area { flex: 1; padding: 3rem; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; }
        #main-test-image { display: none; width: 400px; margin-bottom: 20px; }
        #options-grid { width: 100%; display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #fff; padding: 40px; border-radius: 20px; width: 350px; text-align: center; }
        .google-btn { background: #4285f4; color: white; padding: 12px; width: 100%; border-radius: 8px; border: none; cursor: pointer; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-container">
        
        <!-- El div que el script auth-module.js debe llenar -->
        <div id="header-placeholder"></div>
        
        <div class="stepper-row">
            <div class="stepper-container">
                <div class="step completed"><div class="step-circle">✓</div><div class="step-label">Postulación</div></div>
                <div class="step completed"><div class="step-circle">✓</div><div class="step-label">Análisis</div></div>
                <div class="step active"><div class="step-circle">3</div><div class="step-label">Psicométrico</div></div>
                <div class="step"><div class="step-circle">4</div><div class="step-label">Entrevista</div></div>
            </div>
        </div>

        <div class="scroll-area">
            <img id="main-test-image" src="" alt="Test">
            <div id="options-grid"></div>
        </div>
        
    </div>
</div>

<div id="loginModal" class="modal">
    <div class="modal-content">
        <h2>BlueLab Acceso</h2>
        <button class="google-btn" onclick="ingresarConGoogle()">INGRESAR CON GOOGLE</button>
    </div>
</div>

<script>
    // IMPORTANTE: Si el auth-module.js no está inyectando la cabecera, 
    // asegúrate de que al final de tu archivo auth-module.js tengas una función
    // que haga document.getElementById('header-placeholder').innerHTML = ...
    
    // Verificamos si el auth-module definió la función de login
    window.ingresarConGoogle = window.ingresarConGoogle || function() {
        console.log("Esperando carga de auth-module...");
    };
</script>

<script src="motor-tests.js"></script>

</body>
</html>
