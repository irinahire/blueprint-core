<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación Psicométrica - Irina Hire Selection</title>
    
    <!-- Módulos principales -->
    <script src="../auth-module.js"></script>
    
    <style>
        :root { 
            --fucsia: #bc8abf; 
            --turquesa: #96e8da;
            --irina-gradient: linear-gradient(to right, var(--fucsia) 0%, var(--turquesa) 100%); 
            --bg-dark: #05070a; 
            --bg-body: #f9f7f2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-dark); 
            padding: 20px 2rem; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
        }
        
        /* MARCO AMPLIADO 10% */
        .outer-frame { 
            padding: 8px; 
            background: var(--irina-gradient); 
            border-radius: 50px; 
            width: 95%; 
            max-width: 1350px; 
            margin: 0 auto; 
            min-height: 94vh; 
        }

        .app-container { 
            background: var(--bg-body); 
            width: 100%; 
            min-height: calc(94vh - 16px); 
            border-radius: 42px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* CABECERA (Placeholder para auth-module.js) */
        #header-placeholder { 
            width: 100%; 
            background: white; 
            min-height: 80px; 
            border-bottom: 1px solid #eee;
        }

        /* STEPPER ROW */
        .stepper-row { 
            display: flex; 
            justify-content: center; 
            padding: 25px 20px; 
            background: white; 
            border-bottom: 1px solid #eee; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .stepper-container { 
            display: flex; 
            align-items: center; 
            gap: 40px; 
        }

        .step { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 80px; 
        }

        .step-circle { 
            width: 35px; 
            height: 35px; 
            border-radius: 50%; 
            background: #e0e0e0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            color: #777; 
            font-size: 14px;
        }

        .step.completed .step-circle { background: #8EE4D5; color: #fff; }
        .step.active .step-circle { background: #B588C0; color: #fff; }

        .step-label { 
            font-size: 10px; 
            margin-top: 8px; 
            color: #555; 
            text-transform: uppercase; 
            font-weight: 700; 
            text-align: center; 
            letter-spacing: 0.5px;
        }

        /* CONTENIDO PRINCIPAL */
        .scroll-area { 
            flex: 1; 
            padding: 3rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        /* Requerido por motor-tests.js para renderizar */
        #main-test-image { display: none; width: 400px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-container">
        
        <!-- Header gestionado por auth-module.js -->
        <div id="header-placeholder"></div>
        
        <!-- Stepper de navegación -->
        <div class="stepper-row">
            <div class="stepper-container">
                <div class="step completed"><div class="step-circle">✓</div><div class="step-label">Postulación</div></div>
                <div class="step completed"><div class="step-circle">✓</div><div class="step-label">Análisis</div></div>
                <div class="step active"><div class="step-circle">3</div><div class="step-label">Psicométrico</div></div>
                <div class="step"><div class="step-circle">4</div><div class="step-label">Entrevista</div></div>
            </div>
        </div>

        <!-- Área de contenido para motor-tests.js -->
        <div id="options-grid" class="scroll-area">
            <img id="main-test-image" src="" alt="Test">
        </div>
        
    </div>
</div>

<!-- Script de carga de tests -->
<script src="motor-tests.js"></script>

</body>
</html>
