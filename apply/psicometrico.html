<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Proceso de Aplicación - Irina Hire Selection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(to bottom left, #8EE4D5, #B588C0); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
        .main-container { background: #fff; width: 100%; max-width: 1200px; height: 85vh; display: flex; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .left-column { flex: 1; padding: 2rem; display: flex; flex-direction: column; align-items: center; overflow-y: auto; }
        .matriz-wrapper { position: relative; width: 400px; }
        .mapa-clics { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(2, 1fr); }
        .opcion-area { cursor: pointer; border: 2px solid transparent; }
        .opcion-area:hover { border: 2px solid #B588C0; background: rgba(181, 136, 192, 0.2); }
        .right-column { width: 30%; background: url('https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg') center/cover no-repeat; }
        button { padding: 12px 24px; background: #B588C0; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="left-column">
        <h3 id="titulo-escenario">Escenario 1</h3>
        <div class="matriz-wrapper">
            <img id="matriz-img" src="https://www.bluelab.online/apply/test_a1.png" style="width: 100%;">
            <div id="mapa-opciones" class="mapa-clics"></div>
        </div>
        <p id="pregunta-texto" style="margin-top:20px; font-weight:600;"></p>
        <button onclick="motorTests.siguiente()">Siguiente Escenario</button>
    </div>
    <div class="right-column"></div>
</div>
<script src="motor-tests.js"></script>
</body>
</html>
