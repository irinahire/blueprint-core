<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Procesando...</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --fucsia: #bc8abf;
            --turquesa: #96e8da;
            --irina-gradient: linear-gradient(to right, var(--fucsia) 0%, var(--turquesa) 100%);
            --irina-gradient-inv: linear-gradient(to right, var(--turquesa) 0%, var(--fucsia) 100%);
            --bg-dark: #05070a;
        }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; }
        .card { background: white; width: 100%; border-radius: 40px; overflow: hidden; display: flex; flex-direction: column; min-height: 550px; }
        
        .header { height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; }
        .brand-left { display: flex; flex-direction: column; color: white; font-family: 'Montserrat', sans-serif; }
        .blue-lab-text { font-weight: 900; font-size: 26px; }
        .blueprint-subtext { font-weight: 700; font-size: 11px; text-transform: uppercase; }
        
        .vincha-title { 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 900; 
            font-size: 24px; 
            text-transform: uppercase; 
            background: white; 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            background-image: var(--irina-gradient-inv); 
            filter: drop-shadow(2px 0 0 white) drop-shadow(-2px 0 0 white) drop-shadow(0 2px 0 white) drop-shadow(0 -2px 0 white); 
        }

        .content { display: flex; flex: 1; }
        .left-col { padding: 60px; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .right-col { width: 400px; }
        .right-col img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 0 0 40px 0; }
        
        h1 { font-family: 'Montserrat', sans-serif; font-size: 32px; color: #05070a; margin-bottom: 20px; }
        
        .progress-container { width: 100%; height: 8px; background: #eee; border-radius: 4px; margin-bottom: 30px; }
        #progress-fill { width: 0%; height: 100%; background: var(--irina-gradient-inv); border-radius: 4px; transition: width 1s ease; }
        .step { margin-bottom: 15px; color: #888; font-weight: 600; transition: all 0.3s ease; }
        .step.active { color: #05070a; transform: scale(1.02); }
        .step.done { color: var(--fucsia); }
        
        #diagnostic-box { margin-top: 20px; padding: 20px; border-radius: 20px; background: #f8f9fa; border: 2px solid #eee; display: none; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="card">
        <div class="header">
            <div class="brand-left">
                <span class="blue-lab-text">BLUE LAB</span>
                <span class="blueprint-subtext">Blueprint Integrations Lab</span>
            </div>
            <div class="vincha-title">Irina Hire Selection</div>
        </div>
        
        <div class="content">
            <div class="left-col">
                <h1 id="status-title">Analizando perfil...</h1>
                <div class="progress-container">
                    <div id="progress-fill"></div>
                </div>
                <ul id="steps-list" style="list-style: none; padding: 0;">
                    <li id="step-1" class="step">⏳ Leyendo tu trayectoria</li>
                    <li id="step-2" class="step">⏳ Analizando aptitudes técnicas</li>
                    <li id="step-3" class="step">⏳ Validando idoneidad</li>
                    <li id="step-4" class="step">⏳ Preparando acceso</li>
                </ul>
                <div id="diagnostic-box"></div>
            </div>
            <div class="right-col">
                <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" alt="Irina">
            </div>
        </div>
    </div>
</div>

<script>
    async function iniciarAnalisis() {
        const progressBar = document.getElementById('progress-fill');
        const diagnosticBox = document.getElementById('diagnostic-box');
        const statusTitle = document.getElementById('status-title');
        const params = new URLSearchParams(window.location.search);
        const applicant_id = params.get('id'); 
        
        // El token completo
        const ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0";

        // 1. Ejecución de pasos visuales
        for (let i of [1, 2, 3, 4]) {
            document.getElementById(`step-${i}`).classList.add('active');
            progressBar.style.width = `${i * 25}%`;
            await new Promise(r => setTimeout(r, 800)); 
            document.getElementById(`step-${i}`).classList.remove('active');
            document.getElementById(`step-${i}`).classList.add('done');
            document.getElementById(`step-${i}`).innerText = `✅ ` + document.getElementById(`step-${i}`).innerText.substring(2);
        }

        // 2. Llamada a la función con cabecera Authorization
        try {
            const response = await fetch('https://zuzvozgjsppkxvdlptmk.supabase.co/functions/v1/hbt_irina_compara_cv', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${ANON_KEY}`
                },
                body: JSON.stringify({ applicant_id })
            });
            const result = await response.json();
        diagnosticBox.style.display = 'block';

        if (response.ok) {
            statusTitle.innerText = "Análisis Finalizado";
            diagnosticBox.innerHTML = `<strong>Resultado:</strong> ${result.idoneo ? '✅ Idóneo' : '❌ No cumple el perfil'}<br><br><small>${result.resumen || 'Sin resumen disponible'}</small>`;
            
if (result.idoneo) {
window.location.href = 'https://www.bluelab.online/interview?applicantId=' + applicant_id;
} else {
window.location.href = 'https://www.bluelab.online/interview/gym.html?applicantId=' + applicant_id;
}

        } else {
            statusTitle.innerText = "Error en el proceso";
            diagnosticBox.innerHTML = `<strong style="color:red;">Error del servidor:</strong><br>${result.error || JSON.stringify(result)}`;
        }
    } catch (error) {
        diagnosticBox.style.display = 'block';
        diagnosticBox.innerHTML = `<strong style="color:red;">Error de red:</strong> ${error.message}`;
    }
}
    window.onload = iniciarAnalisis;
</script>

</body>
</html>
