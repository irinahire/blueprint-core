<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="partner/style.css">
    <style>
        /* CSS específico para el Modal - Sobreescribe cualquier conflicto */
        #modal-perfil { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; overflow-y: auto; }
        .modal-content { background: white; width: 85%; max-width: 900px; margin: 50px auto; padding: 40px; border-radius: 20px; position: relative; color: #333; }
        .modal-layout { width: 100%; overflow: hidden; }
        .modal-left { float: left; width: 55%; padding-right: 30px; box-sizing: border-box; }
        .modal-right { float: right; width: 45%; }
        .profile-photo { width: 100%; height: 300px; background-size: cover; background-position: center; border-radius: 15px; margin-bottom: 20px; border: 1px solid #ccc; }
        .clearfix::after { content: ""; clear: both; display: table; }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div id="blue-header"></div>
            <div id="menu-container"></div>
            <div class="dashboard-content">
                <div class="grid-container" id="dashboard"></div>
            </div>
        </div>
    </div>

    <div id="modal-perfil" onclick="this.style.display='none'">
        <div class="modal-content clearfix" onclick="event.stopPropagation()">
            <div style="border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px;">
                <h1 id="m-nombre" style="margin:0;"></h1>
                <p id="m-mail" style="margin:5px 0;"></p>
                <p id="m-telefono" style="font-weight:bold; margin:0;"></p>
            </div>

            <div class="modal-layout">
                <div class="modal-left">
                    <h3>Trayectoria</h3>
                    <div id="m-trayectoria"></div>
                    <h3>Análisis Psicológico</h3>
                    <div id="m-psico"></div>
                </div>

                <div class="modal-right">
                    <div id="m-foto" class="profile-photo"></div>
                    <h3>Formación</h3>
                    <div id="m-estudios"></div>
                    <h3>Habilidades</h3>
                    <p><strong>Blandas:</strong> <span id="m-blandas"></span></p>
                    <p><strong>Técnicas:</strong> <span id="m-duras"></span></p>
                    <canvas id="m-radar-bigfive" style="width:100%; max-height:250px;"></canvas>
                </div>
            </div>
            <button onclick="document.getElementById('modal-perfil').style.display='none'" style="width:100%; padding:15px; margin-top:30px; cursor:pointer; background:#bc8abf; color:white; border:none; border-radius:10px;">Cerrar</button>
        </div>
    </div>

    <script src="../auth-module.js"></script>
    <script src="partner/naipes.js" defer></script>
    <script src="partner/menu-partner.js" defer></script>
</body>
</html>
