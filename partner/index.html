<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="partner/style.css">
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div id="blue-header"></div>
            <div id="menu-container"></div>
            <div class="dashboard-content">
                <div class="grid-container" id="dashboard"></div>
            </div>
        </div>
    </div>

    <div id="modal-perfil" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div style="border-bottom: 2px solid #eee; margin-bottom: 20px; padding-bottom: 10px;">
                <h1 id="m-nombre" style="margin:0;"></h1>
                <div style="display:flex; align-items:center; gap:10px;">
                    <p id="m-mail" style="margin:5px 0;"></p>
                    <a id="btn-mail" href="#" style="text-decoration:none;">📧</a>
                </div>
                <div style="display:flex; align-items:center; gap:10px;">
                    <p id="m-telefono" style="font-weight:bold; margin:0;"></p>
                    <a id="btn-wapp" href="#" style="text-decoration:none;">💬</a>
                </div>
            </div>

            <table style="width: 100%; border-collapse: collapse;">
                <tr>
                    <td style="width: 60%; vertical-align: top; padding-right: 20px;">
                        <h3>Trayectoria</h3>
                        <div id="m-trayectoria"></div>
                        <h3>Análisis Psicológico</h3>
                        <div id="m-psico"></div>
                    </td>
                    <td style="width: 40%; vertical-align: top;">
                        <div id="m-foto" class="profile-photo"></div>
                        <h3>Formación</h3>
                        <div id="m-estudios"></div>
                        <h3>Habilidades Blandas</h3>
                        <p id="m-blandas"></p>
                        <h3>Habilidades Técnicas</h3>
                        <p id="m-duras"></p>
                        <button onclick="document.getElementById('modal-perfil').style.display='none'" style="width:100%; padding:15px; margin-top:20px; cursor:pointer;">Cerrar</button>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <script src="../auth-module.js"></script>
    <script src="partner/naipes.js" defer></script>
    <script src="partner/menu-partner.js" defer></script>
</body>
</html>
