<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS directo para forzar ancho total */
        #modal-perfil { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; overflow-y: auto; padding: 20px; }
        .modal-content { width: 95%; max-width: 1400px; margin: 20px auto; background: white; padding: 40px; border-radius: 20px; position: relative; }
        .full-table { width: 100%; border-collapse: collapse; }
        .full-table td { vertical-align: top; padding: 20px; width: 50%; }
        .profile-photo { width: 100%; max-width: 300px; height: 300px; background-size: cover; background-position: center; border-radius: 15px; margin-bottom: 20px; }
        .radar-box { width: 100%; max-width: 500px; height: 400px; }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div id="blue-header"></div>
            <div id="menu-container"></div>
            <div class="dashboard-content">
                <div class="grid-container" id="dashboard"></div>
            </div>
        </div>
    </div>

    <div id="modal-perfil" onclick="this.style.display='none'">
        <div class="modal-content" onclick="event.stopPropagation()">
            <table class="full-table">
                <tr>
                    <td colspan="2">
                        <h1 id="m-nombre" style="margin:0;"></h1>
                        <p id="m-mail"></p>
                        <p id="m-telefono"></p>
                    </td>
                </tr>
                <tr>
                    <td>
                        <h3>Trayectoria</h3>
                        <div id="m-trayectoria"></div>
                        <h3>Análisis Psicológico</h3>
                        <div id="m-psico"></div>
                    </td>
                    <td>
                        <div id="m-foto" class="profile-photo"></div>
                        <div class="radar-box">
                            <canvas id="m-radar-bigfive"></canvas>
                        </div>
                    </td>
                </tr>
            </table>
            <button onclick="document.getElementById('modal-perfil').style.display='none'" style="width:100%; padding:20px; font-size:18px;">Cerrar</button>
        </div>
    </div>

    <script src="../auth-module.js"></script>
    <script src="partner/naipes.js" defer></script>
</body>
</html>
