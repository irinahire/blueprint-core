<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil de Candidato | Irina Hire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>

  .btn-uniforme { 
    display: inline-flex; 
    align-items: center; 
    justify-content: center; 
    flex: 1; 
    padding: 12px 10px; 
    text-decoration: none; 
    border-radius: 8px; 
    font-weight: bold; 
    cursor: pointer; 
    color: white !important; 
    min-width: 140px; 
    box-sizing: border-box;
    background: linear-gradient(45deg, #bc8abf 0%, #96e8da 100%); 
    border: none;
    position: relative;
    z-index: 1;
}

.btn-uniforme::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 10px;
    background: linear-gradient(45deg, #96e8da, #bc8abf, #96e8da, #bc8abf);
    background-size: 400%;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none; /* Esto permite que el clic pase a través del efecto hacia el botón */
}

.btn-uniforme:hover::before {
    opacity: 1;
    animation: neon-border 3s linear infinite;
}

@keyframes neon-border {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
        
        .card { background: white; width: 1000px; margin: 20px auto; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-family: 'Inter', sans-serif; color: #333; }
        .ficha-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .header-izquierda h1 { margin: 0; font-size: 32px; font-weight: 800; color: #111; }
        .header-derecha { font-size: 30px !important; font-weight: 800 !important; color: #bc8abf !important; }
        .puesto-aplica { margin: 5px 0 0 0; font-size: 18px; color: #666; font-weight: 600; }
        .contenedor-botones { display: flex; gap: 10px; margin-bottom: 35px; border-bottom: 2px solid #eee; padding-bottom: 25px; flex-wrap: wrap; }
        .btn-uniforme { display: inline-flex; align-items: center; justify-content: center; flex: 1; padding: 12px 10px; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white !important; min-width: 140px; box-sizing: border-box; }
        
        .ficha-medio { display: grid; grid-template-columns: 1fr auto; gap: 40px; margin-bottom: 30px; align-items: start; }
        .bloque-visual { display: flex; gap: 20px; justify-content: flex-end; }
        .photo-mini { width: 250px; height: 250px; background-size: cover; background-position: center; border-radius: 12px; border: 1px solid #ddd; }
        .radar-mini { width: 250px; height: 250px; border-radius: 12px; border: 1px solid #ddd; background-color: #fdfdfd; background-size: contain; background-repeat: no-repeat; background-position: center; padding: 10px; box-sizing: border-box; }
        
        .grupo-botones { display: flex; gap: 12px; margin-bottom: 15px; }
        .grupo-descargas { display: flex; gap: 12px; margin-bottom: 35px; border-bottom: 2px solid #eee; padding-bottom: 25px; }
        .btn-action { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: white !important; }
        .btn-download { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; text-decoration: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #555 !important; background: #f0f0f0; border: 1px solid #ccc; }
        
        .seccion-texto { margin-bottom: 25px; }
        .seccion-texto h3 { border-left: 4px solid #bc8abf; padding-left: 10px; color: #222; }
        .tabla-oferta { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .tabla-oferta td { padding: 10px; border: 1px solid #eee; }
        .tabla-oferta tr td:first-child { font-weight: bold; width: 30%; background: #f9f9f9; }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div id="blue-header"></div>
            <div class="dashboard-content">
                <div class="card">
                    <div class="ficha-header">
    <div class="header-izquierda">
        <h1 id="m-nombre">Cargando...</h1>
        <p class="puesto-aplica">Postulación: <span id="m-puesto"></span></p>
    </div>
    <!-- Agregamos la clase header-derecha aquí y forzamos tamaño -->
    <div class="header-derecha" style="font-size: 30px; font-weight: 800; color: #bc8abf;">
        <span id="m-blic"></span> | <span id="m-score-blic"></span>
    </div>
</div>

                    <div class="ficha-medio">
                        <div class="resumen-profesional">
                            <h3>Resumen Profesional</h3>
                            <p id="m-resumen"></p>
                            <p id="m-mail"></p>
                            <p id="m-tel"></p>
                        </div>
                        <div class="bloque-visual">
                            <div id="m-foto" class="photo-mini"></div>
                            <div id="m-radar" class="radar-mini"></div>
                        </div>
                    </div>

<!-- Reemplaza el grupo de botones y el de descargas por este bloque único -->
<div class="contenedor-botones">
    <a id="btn-wapp" class="btn-uniforme" target="_blank">WhatsApp</a>
    <a id="btn-email" class="btn-uniforme">Email</a>
    <a id="btn-linkedin" class="btn-uniforme" target="_blank">LinkedIn</a>
    <a id="btn-cv" class="btn-uniforme">CV</a>
    <a id="btn-audio" class="btn-uniforme">Audio</a>
    <a id="btn-pdf" class="btn-uniforme">PDF</a>
</div>

                    <div class="seccion-texto">
                        <h3>Detalle de Oferta Laboral</h3>
                        <table id="m-oferta" class="tabla-oferta"></table>
                    </div>

                    <div class="seccion-texto">
                        <h3>Trayectoria Profesional</h3>
                        <div id="m-trayectoria"></div>
                    </div>
                    <div class="seccion-texto">
                        <h3>Análisis Profesional</h3>
                        <div id="m-analisis"></div>
                    </div>
                    <div class="seccion-texto">
                        <h3>Evaluación Psicométrica</h3>
                        <div id="m-psicometria"></div>
                    </div>
                    <div class="seccion-texto">
                        <h3>Entrevista (Vapi)</h3>
                        <div id="m-entrevista"></div>
                    </div>
                    <div class="seccion-texto">
                        <h3>Habilidades</h3>
                        <div id="m-habilidades"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../auth-module.js"></script>
    <script src="perfil.js" defer></script>
</body>
</html>
