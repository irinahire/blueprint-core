<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Empresa | BlueLab</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --fucsia: #bc8abf; --bg-dark: #05070a; --mint-irina: #96e8da; }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: white; }
        
        /* Contenedor principal con tu estilo */
        .outer-frame { padding: 4px; background: linear-gradient(to right, var(--fucsia), var(--mint-irina)); border-radius: 50px; width: 90%; max-width: 600px; }
        .app-container { background: white; width: 100%; border-radius: 46px; padding: 40px; color: #333; }
        
        .top-banner { background: linear-gradient(to right, var(--fucsia), var(--mint-irina)); color: white; padding: 20px; border-radius: 25px; text-align: center; font-weight: 900; font-size: 20px; text-transform: uppercase; margin-bottom: 30px; }
        
        .input-group { position: relative; margin-top: 25px; }
        .input-group input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 12px; outline: none; font-size: 16px; }
        .input-group label { position: absolute; left: 15px; top: 15px; color: var(--fucsia); font-weight: 700; pointer-events: none; transition: 0.2s; background: white; padding: 0 5px; }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top: -10px; font-size: 12px; }
        
        #submit-btn { width: 100%; padding: 15px; margin-top: 30px; background: linear-gradient(to right, var(--fucsia), var(--mint-irina)); border: none; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-container">
        <div class="top-banner">Registro de Empresa</div>
        <form id="empresa-form">
            <div class="input-group"><input type="text" id="nombre" placeholder=" " required><label>Nombre Fantasía</label></div>
            <div class="input-group"><input type="text" id="razon" placeholder=" " required><label>Razón Social</label></div>
            <div class="input-group"><input type="text" id="cuit" placeholder=" " required><label>CUIT</label></div>
            <div class="input-group"><input type="text" id="condicion" placeholder=" " required><label>Condición Fiscal</label></div>
            <div class="input-group"><input type="email" id="email" placeholder=" " required><label>Email Corporativo</label></div>
            <button type="submit" id="submit-btn">REGISTRAR EMPRESA</button>
        </form>
    </div>
</div>

<script>
    const sb = supabase.createClient(
        'https://zuzvozgjsppkxvdlptmk.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0'
    );

    document.getElementById('empresa-form').onsubmit = async (e) => {
        e.preventDefault();
        
        // Obtenemos el usuario actual de la sesión (el mismo método de tu index)
        const { data: { user } } = await sb.auth.getUser();
        
        if (!user) {
            alert("Por favor, inicia sesión primero en el Home de BlueLab.");
            return;
        }

        const btn = document.getElementById('submit-btn');
        btn.innerText = "REGISTRANDO...";

        try {
            const { data, error } = await sb.functions.invoke('hbt_registro_empresa', {
                body: {
                    p_owner_id: user.id, // ID real del logueado
                    p_nombre_fantasia: document.getElementById('nombre').value,
                    p_razon_social: document.getElementById('razon').value,
                    p_cuit: document.getElementById('cuit').value,
                    p_condicion_fiscal: document.getElementById('condicion').value,
                    p_email_corporativo: document.getElementById('email').value
                }
            });

            if (error) throw error;
            alert("¡Empresa registrada con éxito!");
            window.location.href = "https://bluelab.online"; // Volvemos al dashboard
        } catch (err) {
            alert("Error: " + err.message);
            btn.innerText = "REGISTRAR EMPRESA";
        }
    };
</script>
</body>
</html>
