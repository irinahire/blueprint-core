<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Crear Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); --fucsia: #bc8abf; --bg-dark: #05070a; }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 92%; max-width: 1150px; height: 85vh; display: flex; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-vincha { width: 100%; height: 90px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; box-sizing: border-box; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 24px; color: white; }
        
        .main-body { flex: 1; display: flex; overflow: hidden; }
        .form-side { flex: 1; padding: 40px; overflow-y: auto; }
        .form-title { font-family: 'Montserrat', sans-serif; color: var(--fucsia); margin-bottom: 25px; font-size: 22px; }
        
        /* Ajuste de campos */
        .field-container { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .input-wrapper { flex: 1; display: flex; align-items: center; gap: 10px; }
        
        input, textarea { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 9px; }
        .disabled-input { background: #f9f9f9; opacity: 0.5; pointer-events: none; }

        /* Switch a la derecha */
        .switch { width: 40px; height: 20px; background: #ddd; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .switch.active { background: var(--fucsia); }
        .switch::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .switch.active::after { left: 22px; }
        
        /* Botón láser */
        .btn-wrapper { position: relative; padding: 3px; border-radius: 12px; margin-top: 20px; overflow: hidden; }
        .btn-wrapper::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, #96e8da, var(--fucsia), transparent); animation: rotate 3s linear infinite; }
        #submit-btn { position: relative; width: 100%; height: 50px; background: linear-gradient(to right, #96e8da, var(--fucsia)); color: white; border: none; border-radius: 9px; font-weight: 800; cursor: pointer; z-index: 1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .visual-side { width: 35%; height: 100%; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 15%); }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div class="top-vincha">
                <div style="color:white; font-weight:900;">BLUE LAB</div>
                <div class="vincha-title">Irina Hire Selection</div>
            </div>
            <div class="main-body">
                <div class="form-side">
                    <h2 class="form-title">Crear Oferta Laboral</h2>
                    
                    <input type="text" placeholder="Título del Puesto" style="margin-bottom:15px; width: 100%; box-sizing: border-box;">
                    <textarea placeholder="Descripción del Puesto" style="margin-bottom:15px; width: 100%; box-sizing: border-box; height: 80px;"></textarea>
                    
                    <div class="field-container"><div class="input-wrapper"><input type="text" id="modalidad" class="disabled-input" placeholder="Modalidad"><div class="switch" onclick="toggleField('modalidad')"></div></div></div>
                    <div class="field-container"><div class="input-wrapper"><input type="number" id="salario" class="disabled-input" placeholder="Pretensión Salarial"><div class="switch" onclick="toggleField('salario')"></div></div></div>
                    <div class="field-container"><div class="input-wrapper"><input type="number" id="experiencia" class="disabled-input" placeholder="Años de Experiencia"><div class="switch" onclick="toggleField('experiencia')"></div></div></div>

                    <div class="btn-wrapper"><button id="submit-btn">PUBLICAR OFERTA</button></div>
                </div>
                <div class="visual-side">
                    <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleField(id) {
            const input = document.getElementById(id);
            const sw = event.target;
            input.classList.toggle('disabled-input');
            sw.classList.toggle('active');
        }
    </script>
</body>
</html>
