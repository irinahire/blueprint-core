<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Crear Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); --fucsia: #bc8abf; --bg-dark: #05070a; }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1000px; height: 90vh; display: flex; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Ajuste de vincha para que el texto no se corte */
        .top-vincha { width: 100%; height: 80px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 20px; color: white; white-space: nowrap; }
        
        .main-body { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* Formulario con scroll interno */
        .form-side { flex: 1; padding: 0 60px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        
        /* Barra flotante fija arriba */
        .sticky-header { position: sticky; top: 0; background: white; padding: 20px 0; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 550px; z-index: 10; border-bottom: 1px solid #eee; }
        .form-content { width: 100%; max-width: 550px; padding-top: 10px; }
        
        .form-title { font-family: 'Montserrat', sans-serif; color: var(--fucsia); font-size: 20px; margin: 0; }
        
        /* Botón de publicar fijo arriba */
        .btn-pub-top { background: var(--fucsia); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 800; cursor: pointer; }

        .field-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .input-group { flex: 1; display: flex; align-items: center; gap: 10px; }
        
        input, textarea { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; }
