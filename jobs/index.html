<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Nueva Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); 
            --btn-gradient: linear-gradient(to right, #96e8da 0%, #bc8abf 100%);
            --fucsia: #bc8abf; --bg-dark: #05070a; 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1050px; height: 92vh; display: flex; align-items: center; justify-content: center; }
        .app-shell { width: 100%; height: 100%; background: white; border-radius: 40px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 80px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; color: white; font-weight: 900; }
        .content-area { flex: 1; display: flex; overflow: hidden; }
        .form-container { flex: 1; overflow-y: auto; padding: 40px 60px; display: flex; flex-direction: column; align-items: center; }
        .form-content { width: 100%; max-width: 550px; }
        
        .btn-pub { background: var(--btn-gradient); color: white; border: none; padding: 12px 25px; border-radius: 9px; font-weight: 800; cursor: pointer; margin-top: 20px; width: 100%; }
        .field-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        input, textarea { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; }
        .disabled-input { background: #f4f4f4; opacity: 0.5; pointer-events: none; }
        .switch { width: 40px; height: 20px; background: #ddd; border-radius: 20px; cursor: pointer; flex-shrink: 0; }
        .switch.active { background: var(--fucsia); }
        .sidebar { width: 300px; flex-shrink: 0; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-shell">
        <div class="header">
            <div>BLUE LAB</div>
            <div style="font-family: 'Montserrat', sans-serif;">Irina Hire Selection</div>
        </div>
        <div class="content-area">
            <div class="form-container">
                <div class="form-content">
                    <h2 style="color:var(--fucsia);">Nueva Oferta Laboral</h2>
                    <input type="text" id="titulo" placeholder="Título del Puesto" style="width:100%; margin-bottom:10px;">
                    <textarea id="desc" placeholder="Descripción del puesto" style="width:100%; height:80px; margin-bottom:10px;"></textarea>
                    <textarea id="req" placeholder="Requisitos del puesto" style="width:100%; height:80px; margin-bottom:20px;"></textarea>
                    
                    <div class="field-row"><input type="text" id="m1" class="disabled-input" placeholder="Modalidad"><div class="switch" onclick="toggleField('m1', this)"></div></div>
                    <div class="field-row"><input type="number" id="m2" class="disabled-input" placeholder="Salario"><div class="switch" onclick="toggleField('m2', this)"></div></div>
                    <div class="field-row"><input type="number" id="m3" class="disabled-input" placeholder="Años experiencia"><div class="switch" onclick="toggleField('m3', this)"></div></div>
                    <div class="field-row"><input type="text" id="m4" class="disabled-input" placeholder="Cultura"><div class="switch" onclick="toggleField('m4', this)"></div></div>
                    
                    <button class="btn-pub" onclick="publicarOferta()">PUBLICAR</button>
                </div>
            </div>
            <div class="sidebar">
                <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
            </div>
        </div>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://zuzvozgjsppkxvdlptmk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0');

    function toggleField(id, el) {
        document.getElementById(id).classList.toggle('disabled-input');
        el.classList.toggle('active');
    }

    async function publicarOferta() {
        const btn = document.querySelector('.btn-pub');
        btn.innerText = "Publicando...";
        
        const payload = {
            titulo: document.getElementById('titulo').value,
            jsonf: {
                data: {
                    descripcion: document.getElementById('desc').value,
                    requisitos: document.getElementById('req').value
                }
            }
        };

        try {
            const { error } = await sb.from('crear_oferta').insert([payload]);
            if (error) throw error;
            alert("¡Oferta publicada exitosamente!");
            // Limpieza básica
            document.getElementById('titulo').value = '';
            document.getElementById('desc').value = '';
            document.getElementById('req').value = '';
        } catch (e) {
            console.error(e);
            alert("Error: " + e.message);
        } finally {
            btn.innerText = "PUBLICAR";
        }
    }
</script>
</body>
</html>
