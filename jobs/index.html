<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irina | Gestión de Talento</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); margin: 0; padding: 0; }
        
        /* Vincha superior */
        header { background: var(--primary-gradient); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Layout principal */
        main { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; padding: 2rem; max-width: 1200px; margin: auto; }
        
        /* Estética de naipes/tarjetas */
        .card { background: var(--card-bg); padding: 2rem; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* Estilo de Irina a la derecha */
        .irina-sidebar { text-align: center; }
        .irina-img { width: 150px; height: 150px; border-radius: 50%; background: #ddd; margin-bottom: 1rem; border: 4px solid #764ba2; }
    </style>
</head>
<body>

<header>
    <h1>Irina - Ecosistema de Talento</h1>
    <nav>Dashboard | Ofertas | Candidatos</nav>
</header>

<main>
    <section class="card">
        <h2>Crear nueva oferta laboral</h2>
        <p>Configura los parámetros de búsqueda con los interruptores.</p>
        </section>

    <aside class="irina-sidebar">
        <div class="irina-img"></div> <h3>Irina</h3>
        <p>Estoy lista para ayudarte a encontrar al mejor candidato.</p>
    </aside>
</main>

</body>
</html>
