<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Nueva Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --fucsia: #bc8abf; --bg-dark: #05070a; --irina-gradient: linear-gradient(to right, #bc8abf, #96e8da); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1050px; height: 92vh; display: flex; align-items: center; justify-content: center; }
        .app-shell { width: 100%; height: 100%; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        
        .sticky-header { padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; background: white; z-index: 10; }
        
        .content-area { flex: 1; display: flex; overflow: hidden; }
        .form-container { flex: 1; padding: 20px 60px; overflow-y: auto; }
        
        .input-group { position: relative; margin-top: 25px; margin-bottom: 10px; }
        .input-group label { position: absolute; left: 12px; top: 12px; color: #333; font-weight: 700; transition: 0.2s; pointer-events: none; background: white; padding: 0 4px; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid #eee; border-radius: 10px; outline: none; font-size: 14px; }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top: -10px; font-size: 11px; color: var(--fucsia); }
        
        .btn-pub { background: var(--fucsia); color: white; border: none; padding: 12px 25px; border-radius: 9px; font-weight: 800; cursor: pointer; }
        
        .sidebar { width: 300px; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 15%); }
        
        #success-screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-shell">
        <div class="sticky-header">
            <h2 style="color:var(--fucsia); margin:0;">Nueva Oferta Laboral</h2>
            <button class="btn-pub" onclick="publicarOferta()">PUBLICAR</button>
        </div>

        <div class="content-area">
            <div id="form-wrapper" class="form-container">
                <div class="input-group"><input type="text" id="titulo" placeholder="Ej: Desarrollador Sr, Analista UX"><label>Título del Puesto</label></div>
                <div class="input-group"><input type="text" id="desc" placeholder="Ej: Gestión de equipos, Análisis métricas"><label>Descripción</label></div>
                <div class="input-group"><input type="text" id="req" placeholder="Ej: Python, Inglés avanzado, SQL"><label>Requisitos</label></div>
                <div class="input-group"><input type="text" id="m1" placeholder="Ej: Remoto, Presencial, Híbrido"><label>Modalidad</label></div>
                <div class="input-group"><input type="text" id="m2" placeholder="Ej: 2000, 3500, 5000"><label>Salario</label></div>
                <div class="input-group"><input type="text" id="m3" placeholder="Ej: 2, 5, 8+ años"><label>Experiencia</label></div>
                <div class="input-group"><input type="text" id="m4" placeholder="Ej: Ágil, Formal, Startup"><label>Cultura</label></div>
                <div class="input-group"><input type="text" id="m5" placeholder="Ej: Salud, Gimnasio, Capacitación"><label>Beneficios</label></div>
                <div class="input-group"><input type="text" id="m6" placeholder="Ej: Buenos Aires, Remoto"><label>Ubicación</label></div>
            </div>

            <div id="success-screen">
                <h1 style="color:var(--fucsia);">¡Oferta Creada!</h1>
                <button class="btn-pub" onclick="resetForm()">Crear otra oferta</button>
            </div>
            
            <div class="sidebar"><img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg"></div>
        </div>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://zuzvozgjsppkxvdlptmk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0');

    function resetForm() {
        document.getElementById('form-wrapper').style.display = 'block';
        document.getElementById('success-screen').style.display = 'none';
        document.querySelectorAll('input').forEach(el => el.value = '');
    }

    async function publicarOferta() {
        const btn = document.querySelector('.btn-pub');
        btn.innerText = "Publicando...";
        try {
            const { error } = await sb.from('crear_oferta').insert([{
                titulo: document.getElementById('titulo').value,
                jsonf: { data: { 
                    desc: document.getElementById('desc').value,
                    req: document.getElementById('req').value,
                    mod: document.getElementById('m1').value,
                    sal: document.getElementById('m2').value,
                    exp: document.getElementById('m3').value,
                    cult: document.getElementById('m4').value,
                    ben: document.getElementById('m5').value,
                    ubi: document.getElementById('m6').value
                }}
            }]);
            if (error) throw error;
            document.getElementById('form-wrapper').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
        } catch (e) { alert("Error: " + e.message); } finally { btn.innerText = "PUBLICAR"; }
    }
</script>
</body>
</html>
