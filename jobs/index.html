<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Nueva Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --fucsia: #bc8abf; --gris-claro: #e0e0e0; --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); --btn-gradient: linear-gradient(to right, #96e8da 0%, #bc8abf 100%); --bg-dark: #05070a; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1050px; height: 92vh; display: flex; align-items: center; justify-content: center; }
        .app-shell { width: 100%; height: 100%; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Contenedor dinámico del módulo auth */
        #blue-header { height: 80px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; color: white; font-family: 'Montserrat', sans-serif; flex-shrink: 0; }
        
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:40px; border-radius:20px; text-align:center; color:#333; }

        .content-area { flex: 1; display: flex; overflow: hidden; position: relative; }
        .form-container { flex: 1; padding: 0; overflow-y: auto; display: flex; flex-direction: column; }
        .sticky-controls { background: white; padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; flex-shrink: 0; }
        
        .btn-wrapper { position: relative; padding: 3px; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .btn-wrapper::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--fucsia), #96e8da, transparent); animation: rotate 3s linear infinite; display: none; }
        .btn-wrapper:hover::before { display: block; }
        .btn-pub { background: var(--btn-gradient); color: white; border: none; padding: 12px 30px; border-radius: 9px; font-weight: 800; cursor: pointer; position: relative; z-index: 1; font-family: 'Inter'; min-width: 120px; }
        .btn-copy { background: #96e8da; color: var(--fucsia); border: 2px solid var(--fucsia); padding: 10px 20px; border-radius: 9px; font-weight: 800; cursor: pointer; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .form-fields { flex: 1; padding: 0 60px 40px 60px; }
        .input-group { position: relative; margin-top: 30px; }
        .input-group label { position: absolute; left: 12px; top: 14px; color: var(--fucsia); font-weight: 700; transition: 0.2s; pointer-events: none; background: white; padding: 0 4px; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid var(--gris-claro); border-radius: 10px; outline: none; font-size: 14px; color: #333; }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top: -10px; font-size: 11px; color: var(--fucsia); }
        .input-group input::placeholder { color: var(--fucsia); font-weight: 700; opacity: 0.5; }
        
        #success-screen { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .sidebar { width: 300px; position: relative; flex-shrink: 0; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 10%); }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-shell">
        <!-- Cabecera inyectada por el módulo -->
        <div id="blue-header"></div>
        
        <div class="content-area">
            <div id="form-wrapper" class="form-container">
                <div class="sticky-controls">
                    <h2 style="color:var(--fucsia); margin:0;">Nueva Oferta Laboral</h2>
                    <div class="btn-wrapper"><button class="btn-pub" id="main-btn" onclick="publicarOferta()">PUBLICAR</button></div>
                </div>
                <div class="form-fields">
                    <div class="input-group"><input type="text" id="titulo" placeholder="Ej: Especialista Senior en Ciberseguridad y Arquitectura Cloud"><label>Título del Puesto</label></div>
                    <div class="input-group"><input type="text" id="desc" placeholder="Ej: Gestión de infraestructura crítica, implementación de protocolos de seguridad y auditorías"><label>Descripción</label></div>
                    <div class="input-group"><input type="text" id="req" placeholder="Ej: Certificaciones AWS/Azure, experiencia comprobable en entornos de producción, dominio de Python/Go"><label>Requisitos</label></div>
                    <div class="input-group"><input type="text" id="m1" placeholder="Ej: Híbrido 3x2 en oficinas de CABA con horario flexible"><label>Modalidad</label></div>
                    <div class="input-group"><input type="text" id="m2" placeholder="Ej: Rango competitivo de mercado + bono anual por cumplimiento de objetivos"><label>Salario</label></div>
                    <div class="input-group"><input type="text" id="m3" placeholder="Ej: Mínimo 5 años en roles similares de alta responsabilidad técnica"><label>Experiencia</label></div>
                    <div class="input-group"><input type="text" id="m4" placeholder="Ej: Orientación a la innovación constante, trabajo colaborativo y pensamiento analítico"><label>Cultura</label></div>
                    <div class="input-group"><input type="text" id="m5" placeholder="Ej: Prepaga de primer nivel, presupuesto anual para capacitaciones y certificaciones"><label>Beneficios</label></div>
                    <div class="input-group"><input type="text" id="m6" placeholder="Ej: Sede corporativa en el Distrito Tecnológico de Parque Patricios"><label>Ubicación</label></div>
                </div>
            </div>

            <div id="success-screen">
                <h1 style="color:var(--fucsia);">¡Oferta Creada!</h1>
                <p>Copiá la URL de esta oferta para compartirla:</p>
                <div style="display: flex; gap: 10px; align-items: center; margin: 20px 0;">
                    <input type="text" id="full-url" style="padding:10px; border:1px solid #ccc; border-radius:5px; width: 350px; font-family:monospace;" readonly>
                    <button class="btn-copy" onclick="copiarUrl()">Copiar</button>
                </div>
                <div id="copy-feedback" style="color:var(--fucsia); font-weight:600; height: 20px; margin-bottom: 20px;"></div>
                <div class="btn-wrapper"><button class="btn-pub" onclick="resetForm()">Crear otra oferta</button></div>
            </div>
            
            <div class="sidebar"><img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg"></div>
        </div>
    </div>
</div>

<!-- Incluir tu módulo de auth aquí -->
<script src="../auth-module.js"></script>

<script>
    // Usamos el cliente global window.sbClient definido en auth-module.js
    function resetForm() {
        document.getElementById('main-btn').innerText = "PUBLICAR";
        document.getElementById('form-wrapper').style.display = 'flex';
        document.getElementById('success-screen').style.display = 'none';
        document.querySelectorAll('input').forEach(el => { if(el.id !== 'full-url') el.value = ''; });
        document.getElementById('form-wrapper').scrollTop = 0;
    }

    function copiarUrl() {
        const input = document.getElementById('full-url');
        input.select();
        document.execCommand('copy');
        document.getElementById('copy-feedback').innerText = "¡URL copiada!";
    }

    async function publicarOferta() {
        // Verificamos si existe un usuario usando el storage gestionado por el módulo
        const applicantId = localStorage.getItem('applicantId');
        if (!applicantId) {
            document.getElementById('loginModal').style.display = 'flex';
            return;
        }
        
        const btn = document.getElementById('main-btn');
        btn.innerText = "Publicando...";
        const jobId = crypto.randomUUID();
        
        const datosOferta = {
            titulo: document.getElementById('titulo').value,
            detalles: {
                desc: document.getElementById('desc').value,
                req: document.getElementById('req').value,
                m1: document.getElementById('m1').value,
                m2: document.getElementById('m2').value,
                m3: document.getElementById('m3').value,
                m4: document.getElementById('m4').value,
                m5: document.getElementById('m5').value,
                m6: document.getElementById('m6').value
            },
            jobIdUuid: jobId
        };

        try {
            const { error } = await window.sbClient.functions.invoke('hbt_crear_oferta', {
                body: datosOferta,
                headers: { Authorization: `Bearer ${(await window.sbClient.auth.getSession()).data.session.access_token}` }
            });
            if (error) throw error;
            document.getElementById('full-url').value = 'https://www.bluelab.online/apply?oferta=' + jobId;
            document.getElementById('form-wrapper').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
        } catch (e) { 
            console.error(e);
            document.getElementById('copy-feedback').innerText = "Error al publicar"; 
            btn.innerText = "PUBLICAR"; 
        }
    }
</script>
</body>
</html>
