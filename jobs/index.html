<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Nueva Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); 
            --btn-gradient: linear-gradient(to right, #96e8da 0%, #bc8abf 100%);
            --fucsia: #bc8abf; --bg-dark: #05070a; 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1050px; height: 92vh; display: flex; align-items: center; justify-content: center; }
        .app-shell { width: 100%; height: 100%; background: white; border-radius: 40px; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .header { height: 80px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; color: white; font-weight: 900; }
        .content-area { flex: 1; display: flex; overflow: hidden; }
        .form-container { flex: 1; overflow-y: auto; padding: 0 60px; display: flex; flex-direction: column; align-items: center; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .sticky-controls { position: sticky; top: 0; background: white; padding: 20px 0; display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 550px; z-index: 10; border-bottom: 1px solid #eee; }
        .form-content { width: 100%; max-width: 550px; padding-bottom: 40px; }
        
        .btn-wrapper { position: relative; padding: 3px; border-radius: 12px; overflow: hidden; }
        .btn-wrapper::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--fucsia), #96e8da, transparent); animation: rotate 3s linear infinite; display: none; }
        .btn-wrapper:hover::before { display: block; }
        .btn-pub { background: var(--btn-gradient); color: white; border: none; padding: 12px 25px; border-radius: 9px; font-weight: 800; cursor: pointer; position: relative; z-index: 1; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .field-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        input, textarea { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; outline: none; }
        input:focus { border-color: var(--fucsia); }
        .disabled-input { background: #f4f4f4; opacity: 0.5; pointer-events: none; }
        .switch { width: 40px; height: 20px; background: #ddd; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; flex-shrink: 0; }
        .switch.active { background: var(--fucsia); }
        .switch::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .switch.active::after { left: 22px; }
        
        .sidebar { width: 300px; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 15%); }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-shell">
        <div class="header">
            <div>BLUE LAB</div>
            <div style="font-family: 'Montserrat', sans-serif;">Irina Hire Selection</div>
        </div>
        <div class="content-area">
            <div class="form-container">
                <div class="sticky-controls">
                    <h2 style="color:var(--fucsia); margin:0;">Nueva Oferta Laboral</h2>
                    <div class="btn-wrapper"><button class="btn-pub" onclick="publicarOferta()">PUBLICAR</button></div>
                </div>
                
                <div class="form-content">
                    <input type="text" id="titulo" placeholder="Título del Puesto" style="width:100%; margin-bottom:10px; box-sizing:border-box;">
                    <textarea id="desc" placeholder="Descripción del puesto" style="width:100%; height:80px; margin-bottom:10px; box-sizing:border-box;"></textarea>
                    <textarea id="req" placeholder="Requisitos del puesto" style="width:100%; height:80px; margin-bottom:20px; box-sizing:border-box;"></textarea>
                    
                    <div class="field-row"><input type="text" id="m1" class="disabled-input" placeholder="Modalidad (Ej: Remoto)"><div class="switch" onclick="toggleField('m1', this)"></div></div>
                    <div class="field-row"><input type="number" id="m2" class="disabled-input" placeholder="Salario (Ej: 3000)"><div class="switch" onclick="toggleField('m2', this)"></div></div>
                    <div class="field-row"><input type="number" id="m3" class="disabled-input" placeholder="Años experiencia (Ej: 3+)"><div class="switch" onclick="toggleField('m3', this)"></div></div>
                    <div class="field-row"><input type="text" id="m4" class="disabled-input" placeholder="Cultura Organizacional"><div class="switch" onclick="toggleField('m4', this)"></div></div>
                    <div class="field-row"><input type="text" id="m5" class="disabled-input" placeholder="Beneficios"><div class="switch" onclick="toggleField('m5', this)"></div></div>
                </div>
            </div>
            <div class="sidebar">
                <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
            </div>
        </div>
    </div>
</div>

<script>
    // Inicialización del cliente de Supabase
    const sb = supabase.createClient(
        'https://zuzvozgjsppkxvdlptmk.supabase.co', 
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0'
    );

    function toggleField(id, el) {
        document.getElementById(id).classList.toggle('disabled-input');
        el.classList.toggle('active');
    }

    async function publicarOferta() {
        const btn = document.querySelector('.btn-pub');
        btn.innerText = "Publicando...";
        btn.disabled = true;

        const payload = {
            titulo: document.getElementById('titulo').value,
            modalidad: !document.getElementById('m1').classList.contains('disabled-input') ? document.getElementById('m1').value : null,
            salario: !document.getElementById('m2').classList.contains('disabled-input') ? parseFloat(document.getElementById('m2').value) : null,
            jsonf: {
                "!meta": { "type": "oferta", "version": "1.0" },
                "data": {
                    "descripcion": document.getElementById('desc').value,
                    "requisitos": document.getElementById('req').value,
                    "experiencia": !document.getElementById('m3').classList.contains('disabled-input') ? parseInt(document.getElementById('m3').value) : null,
                    "cultura": !document.getElementById('m4').classList.contains('disabled-input') ? document.getElementById('m4').value : null,
                    "beneficios": !document.getElementById('m5').classList.contains('disabled-input') ? document.getElementById('m5').value : null
                },
                "sub_nodos": [{ "!meta": { "id": "observatorio_stats" }, "data": { "total_postulantes": 0 } }]
            }
        };

        try {
            const { error } = await sb.from('crear_oferta').insert([payload]);
            if (error) throw error;
            
            alert("¡Oferta publicada exitosamente!");
        } catch (e) {
            console.error("Error:", e);
            alert("Error al publicar: " + e.message);
        } finally {
            btn.innerText = "PUBLICAR";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
