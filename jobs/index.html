<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Nueva Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --fucsia: #bc8abf; 
            --gris-claro: #e0e0e0;
            --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); 
            --btn-gradient: linear-gradient(to right, #96e8da 0%, #bc8abf 100%);
            --bg-dark: #05070a; 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: var(--bg-dark); display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1050px; height: 92vh; display: flex; }
        .app-shell { width: 100%; height: 100%; background: white; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { height: 80px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; color: white; font-weight: 900; font-family: 'Montserrat', sans-serif; flex-shrink: 0; }
        
        .content-area { flex: 1; display: flex; overflow: hidden; position: relative; }
        
        /* Contenedor del scroll */
        .scroll-wrapper { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
        
        .sticky-controls { background: white; padding: 20px 60px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; z-index: 10; }
        
        .form-container { padding: 10px 60px 40px 60px; }
        
        .btn-wrapper { position: relative; padding: 3px; border-radius: 12px; overflow: hidden; }
        .btn-pub { background: var(--btn-gradient); color: white; border: none; padding: 12px 25px; border-radius: 9px; font-weight: 800; cursor: pointer; }
        
        .input-group { position: relative; margin-top: 30px; }
        .input-group label { position: absolute; left: 12px; top: 14px; color: var(--fucsia); font-weight: 700; background: white; padding: 0 4px; pointer-events: none; }
        .input-group input { width: 100%; padding: 14px; border: 2px solid var(--gris-claro); border-radius: 10px; outline: none; box-sizing: border-box; }
        .input-group input:focus { border-color: var(--fucsia); }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top: -10px; font-size: 11px; color: var(--fucsia); }
        
        .sidebar { width: 300px; flex-shrink: 0; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 10%); }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-shell">
        <div class="header">
            <div>BLUE LAB</div>
            <div>Irina Hire Selection</div>
        </div>
        
        <div class="content-area">
            <div class="scroll-wrapper">
                <div class="sticky-controls">
                    <h2 style="color:var(--fucsia); margin:0;">Nueva Oferta Laboral</h2>
                    <div class="btn-wrapper"><button class="btn-pub" onclick="publicarOferta()">PUBLICAR</button></div>
                </div>
                
                <div id="form-container" class="form-container">
                    <div class="input-group"><input type="text" id="titulo" placeholder=" "><label>Título del Puesto</label></div>
                    <div class="input-group"><input type="text" id="desc" placeholder=" "><label>Descripción</label></div>
                    <div class="input-group"><input type="text" id="req" placeholder=" "><label>Requisitos</label></div>
                    <div class="input-group"><input type="text" id="m1" placeholder=" "><label>Modalidad</label></div>
                    <div class="input-group"><input type="text" id="m2" placeholder=" "><label>Salario</label></div>
                    <div class="input-group"><input type="text" id="m3" placeholder=" "><label>Experiencia</label></div>
                    <div class="input-group"><input type="text" id="m4" placeholder=" "><label>Cultura</label></div>
                    <div class="input-group"><input type="text" id="m5" placeholder=" "><label>Beneficios</label></div>
                    <div class="input-group"><input type="text" id="m6" placeholder=" "><label>Ubicación</label></div>
                </div>
            </div>
            <div class="sidebar"><img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg"></div>
        </div>
    </div>
</div>
</body>
</html>
