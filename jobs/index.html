<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Crear Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --irina-gradient: linear-gradient(to right, #bc8abf 0%, #96e8da 100%); --fucsia: #bc8abf; --bg-dark: #05070a; }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1000px; height: 90vh; display: flex; }
        .app-container { background: white; width: 100%; height: 100%; border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; }
        
        .top-vincha { width: 100%; height: 80px; background: var(--irina-gradient); display: flex; align-items: center; justify-content: space-between; padding: 0 45px; }
        .vincha-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 22px; color: white; }
        
        .main-body { flex: 1; display: flex; overflow: hidden; }
        /* Centramos el formulario con un ancho controlado */
        .form-side { flex: 1; padding: 30px 60px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .form-content { width: 100%; max-width: 550px; } 
        
        .form-title { font-family: 'Montserrat', sans-serif; color: var(--fucsia); margin-bottom: 25px; font-size: 22px; width: 100%; }
        
        .field-row { display: flex; align-items: center; gap: 15px; margin-bottom: 12px; }
        .input-group { flex: 1; display: flex; align-items: center; gap: 10px; }
        
        input, textarea { flex: 1; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; }
        .disabled-input { background: #f4f4f4; opacity: 0.6; pointer-events: none; }

        .switch { width: 35px; height: 18px; background: #ddd; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; flex-shrink: 0; }
        .switch.active { background: var(--fucsia); }
        .switch::after { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 2px; left: 2px; transition: 0.3s; }
        .switch.active::after { left: 19px; }
        
        .btn-wrapper { position: relative; width: 100%; max-width: 550px; padding: 3px; border-radius: 12px; margin-top: 20px; overflow: hidden; }
        .btn-wrapper::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(transparent, var(--fucsia), #96e8da, transparent); animation: rotate 3s linear infinite; display: none; }
        .btn-wrapper:hover::before { display: block; }
        
        #submit-btn { position: relative; width: 100%; height: 45px; background: linear-gradient(to right, #96e8da, var(--fucsia)); color: white; border: none; border-radius: 9px; font-weight: 800; cursor: pointer; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        
        .visual-side { width: 30%; height: 100%; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 15%); }
    </style>
</head>
<body>
    <div class="outer-frame">
        <div class="app-container">
            <div class="top-vincha">
                <div style="color:white; font-weight:900;">BLUE LAB</div>
                <div class="vincha-title">Irina Hire Selection</div>
            </div>
            <div class="main-body">
                <div class="form-side">
                    <div class="form-content">
                        <h2 class="form-title">Crear Oferta Laboral</h2>
                        
                        <input type="text" placeholder="Ej: Desarrollador Fullstack Senior" style="margin-bottom:10px; width: 100%; box-sizing: border-box;">
                        <textarea placeholder="Ej: Responsable de liderar el equipo de arquitectura..." style="margin-bottom:10px; width: 100%; box-sizing: border-box; height: 60px;"></textarea>
                        <textarea placeholder="Ej: Experiencia en Python, React, SQL y 5 años de práctica..." style="margin-bottom:15px; width: 100%; box-sizing: border-box; height: 60px;"></textarea>
                        
                        <div class="field-row"><div class="input-group"><input type="text" id="modalidad" class="disabled-input" placeholder="Ej: Presencial / Remoto / Híbrido"><div class="switch" onclick="toggleField('modalidad')"></div></div></div>
                        <div class="field-row"><div class="input-group"><input type="number" id="salario" class="disabled-input" placeholder="Ej: 2500 - 3500 USD"><div class="switch" onclick="toggleField('salario')"></div></div></div>
                        <div class="field-row"><div class="input-group"><input type="number" id="experiencia" class="disabled-input" placeholder="Ej: 3+ años"><div class="switch" onclick="toggleField('experiencia')"></div></div></div>
                        <div class="field-row"><div class="input-group"><input type="text" id="cultura" class="disabled-input" placeholder="Ej: Innovadora, ágil, orientada a resultados"><div class="switch" onclick="toggleField('cultura')"></div></div></div>
                        <div class="field-row"><div class="input-group"><input type="text" id="beneficios" class="disabled-input" placeholder="Ej: Medicina prepaga, días de home office"><div class="switch" onclick="toggleField('beneficios')"></div></div></div>

                        <div class="btn-wrapper"><button id="submit-btn">PUBLICAR OFERTA</button></div>
                    </div>
                </div>
                <div class="visual-side">
                    <img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg">
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleField(id) {
            const input = document.getElementById(id);
            const sw = event.target;
            input.classList.toggle('disabled-input');
            sw.classList.toggle('active');
        }
    </script>
</body>
</html>
