<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Irina Hire Selection | Nueva Oferta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --fucsia: #bc8abf; --bg-dark: #05070a; --irina-gradient: linear-gradient(to right, #bc8abf, #96e8da); }
        body { margin: 0; background: var(--bg-dark); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        .outer-frame { padding: 10px; background: var(--irina-gradient); border-radius: 50px; width: 95%; max-width: 1000px; height: 90vh; }
        .app-shell { width: 100%; height: 100%; background: white; border-radius: 40px; display: flex; overflow: hidden; }
        
        .form-container { flex: 1; padding: 40px; overflow-y: auto; }
        .input-group { position: relative; margin-bottom: 25px; }
        
        /* Animación del Label */
        .input-group label { position: absolute; left: 15px; top: 14px; color: #aaa; transition: 0.3s; pointer-events: none; background: white; padding: 0 5px; }
        .input-group input:focus + label, .input-group textarea:focus + label,
        .input-group input:not(:placeholder-shown) + label, .input-group textarea:not(:placeholder-shown) + label { top: -10px; font-size: 12px; color: var(--fucsia); }
        
        input, textarea { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; outline: none; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: var(--fucsia); }
        
        .btn-pub { background: var(--irina-gradient); color: white; border: none; padding: 12px 25px; border-radius: 9px; font-weight: 800; cursor: pointer; width: 100%; }
        .sidebar { width: 300px; }
        .irina-bg { width: 100%; height: 100%; object-fit: cover; mask-image: linear-gradient(to right, transparent 0%, black 15%); }
        #success-screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="app-shell">
        <div id="form-wrapper" class="form-container">
            <h2 style="color:var(--fucsia);">Nueva Oferta Laboral</h2>
            
            <div class="input-group"><input type="text" id="titulo" placeholder=" "><label>Título (Ej: Dev Senior, Analista, UX)</label></div>
            <div class="input-group"><textarea id="desc" placeholder=" " style="height:70px;"></textarea><label>Descripción (Ej: Gestión de equipos, Análisis de métricas)</label></div>
            <div class="input-group"><textarea id="req" placeholder=" " style="height:70px;"></textarea><label>Requisitos (Ej: Python, Inglés, SQL, Certificaciones)</label></div>
            <div class="input-group"><input type="text" id="m1" placeholder=" "><label>Modalidad (Ej: Remoto, Presencial, Híbrido)</label></div>
            <div class="input-group"><input type="text" id="m2" placeholder=" "><label>Salario (Ej: 2000, 3500, 5000)</label></div>
            <div class="input-group"><input type="text" id="m3" placeholder=" "><label>Experiencia (Ej: 2, 5, 8+)</label></div>
            <div class="input-group"><input type="text" id="m4" placeholder=" "><label>Cultura (Ej: Ágil, Formal, Startup)</label></div>
            <div class="input-group"><input type="text" id="m5" placeholder=" "><label>Beneficios (Ej: Salud, Gimnasio, Capacitación)</label></div>
            <div class="input-group"><input type="text" id="m6" placeholder=" "><label>Ubicación (Ej: Buenos Aires, Remoto, Latam)</label></div>
            
            <button class="btn-pub" onclick="publicarOferta()">PUBLICAR</button>
        </div>

        <div id="success-screen">
            <h1 style="color:var(--fucsia);">¡Oferta Creada!</h1>
            <button class="btn-pub" style="width:auto;" onclick="resetForm()">Crear otra oferta</button>
        </div>
        
        <div class="sidebar"><img src="https://i.ibb.co/DPdwz5BK/pages-entrevista-01.jpg" class="irina-bg"></div>
    </div>
</div>

<script>
    const sb = supabase.createClient('https://zuzvozgjsppkxvdlptmk.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1enZvemdqc3Bwa3h2ZGxwdG1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTM2MTYsImV4cCI6MjA5NTQ2OTYxNn0.M-g00y8s9FYwzzVg2mqJoazwQkOsk35gukoOqDZ32r0');

    function resetForm() {
        document.getElementById('form-wrapper').style.display = 'block';
        document.getElementById('success-screen').style.display = 'none';
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
    }

    async function publicarOferta() {
        try {
            const { error } = await sb.from('crear_oferta').insert([{
                titulo: document.getElementById('titulo').value,
                jsonf: { data: { 
                    desc: document.getElementById('desc').value,
                    req: document.getElementById('req').value,
                    mod: document.getElementById('m1').value,
                    sal: document.getElementById('m2').value,
                    exp: document.getElementById('m3').value,
                    cult: document.getElementById('m4').value,
                    ben: document.getElementById('m5').value,
                    ubi: document.getElementById('m6').value
                }}
            }]);
            if (error) throw error;
            document.getElementById('form-wrapper').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
        } catch (e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
